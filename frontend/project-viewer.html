<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartArch — Project Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060a12;--surface:#0f172a;--border:#1e293b;
  --primary:#00d4c8;--violet:#7c3aed;--white:#f1f5f9;
  --slate:#94a3b8;--dark:#64748b;
}
body{background:var(--bg);color:var(--white);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{height:54px;background:rgba(9,14,26,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:1rem;flex-shrink:0;z-index:100;}
.topbar-logo{font-size:1.05rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--violet));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.topbar-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.topbar-project{font-size:0.9rem;font-weight:600;color:var(--white);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar-arch{font-size:0.78rem;color:var(--slate);display:flex;align-items:center;gap:0.4rem;white-space:nowrap;}
.topbar-arch img{width:22px;height:22px;border-radius:50%;object-fit:cover;border:1.5px solid var(--violet);}
.topbar-back{color:var(--slate);text-decoration:none;font-size:0.8rem;display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.75rem;border:1px solid var(--border);border-radius:7px;transition:all 0.15s;white-space:nowrap;}
.topbar-back:hover{border-color:var(--primary);color:var(--primary);}

/* ── Download dropdown ── */
.dl-wrap{position:relative;flex-shrink:0;}
.dl-btn{display:flex;align-items:center;gap:0.4rem;padding:0.38rem 0.9rem;background:linear-gradient(135deg,rgba(0,212,200,0.12),rgba(124,58,237,0.12));border:1px solid rgba(0,212,200,0.3);border-radius:7px;color:var(--primary);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.dl-btn:hover{background:linear-gradient(135deg,rgba(0,212,200,0.22),rgba(124,58,237,0.22));}
.dl-menu{position:absolute;top:calc(100% + 6px);right:0;background:#0c1628;border:1px solid var(--border);border-radius:10px;padding:0.4rem;min-width:200px;z-index:200;display:none;box-shadow:0 12px 40px rgba(0,0,0,0.6);}
.dl-menu.open{display:block;}
.dl-group-label{font-size:0.62rem;font-weight:700;color:var(--dark);text-transform:uppercase;letter-spacing:.07em;padding:0.3rem 0.5rem 0.15rem;}
.dl-option{display:flex;align-items:center;gap:0.55rem;padding:0.48rem 0.6rem;border-radius:6px;cursor:pointer;transition:background 0.12s;border:none;background:none;color:var(--white);width:100%;text-align:left;}
.dl-option:hover{background:rgba(255,255,255,0.06);}
.dl-option i{width:14px;text-align:center;color:var(--primary);font-size:0.75rem;}
.dl-option strong{font-size:0.78rem;display:block;color:var(--white);}
.dl-option small{font-size:0.68rem;color:var(--slate);}
.dl-sep{height:1px;background:var(--border);margin:0.3rem 0;}

/* ── VIEW MODE TABS ── */
.viewtabs{height:46px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:0.25rem;flex-shrink:0;overflow-x:auto;}
.viewtabs::-webkit-scrollbar{display:none;}
.vtab{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.9rem;border-radius:7px;border:none;background:none;color:var(--slate);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;outline:none;}
.vtab:hover{background:var(--border);color:var(--white);}
.vtab.active{background:linear-gradient(135deg,rgba(0,212,200,0.18),rgba(124,58,237,0.18));color:var(--primary);border:1px solid rgba(0,212,200,0.25);}
.vtab i{font-size:0.85rem;}
.vtab-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;margin:0 0.25rem;}

/* ── MAIN LAYOUT ── */
.viewer-body{flex:1;display:flex;overflow:hidden;position:relative;}

/* ── LEFT INFO PANEL ── */
.info-panel{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width 0.22s;}
.info-panel.collapsed{width:0;min-width:0;border:none;}
.info-inner{padding:1rem;overflow-y:auto;flex:1;}
.info-inner::-webkit-scrollbar{width:4px;}
.info-inner::-webkit-scrollbar-track{background:transparent;}
.info-inner::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px;}
.info-section{margin-bottom:1.25rem;}
.info-section-title{font-size:0.7rem;font-weight:700;color:var(--dark);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border);}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:0.3rem 0;border-bottom:1px solid rgba(30,41,59,0.5);}
.info-row:last-child{border:none;}
.info-lbl{font-size:0.75rem;color:var(--slate);}
.info-val{font-size:0.78rem;font-weight:600;color:var(--white);}
.arch-card-mini{display:flex;align-items:center;gap:0.6rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.65rem;}
.arch-mini-name{font-size:0.82rem;font-weight:700;color:var(--white);}
.arch-mini-spec{font-size:0.72rem;color:var(--slate);}
.msg-box{background:var(--bg);border-left:3px solid var(--violet);border-radius:0 8px 8px 0;padding:0.65rem 0.75rem;font-size:0.78rem;color:var(--slate);font-style:italic;line-height:1.5;}
.floor-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,212,200,0.1);color:var(--primary);border:1px solid rgba(0,212,200,0.2);border-radius:6px;padding:2px 9px;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.floor-badge:hover,.floor-badge.active{background:rgba(0,212,200,0.2);}
.floor-badges{display:flex;flex-wrap:wrap;gap:0.35rem;}

/* ── CANVAS AREA ── */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);}
#viewCanvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}

/* Interior container — where interior.js renders its canvas */
#interiorContainer{position:absolute;inset:0;display:none;width:100%;height:100%;}
#interiorCanvas{width:100%;height:100%;display:block;}

/* Generic three container for non-interior 3D views */
#threeContainer{position:absolute;inset:0;display:none;}

/* Room info overlay (mirrors architect.html) */
.interior-room-info{position:absolute;top:1rem;right:1rem;background:rgba(9,14,26,0.88);border:1px solid var(--border);border-radius:10px;padding:0.65rem 0.85rem;min-width:140px;z-index:20;display:none;backdrop-filter:blur(10px);}
.iri-name{font-size:0.85rem;font-weight:700;color:var(--white);margin-bottom:2px;}
.iri-sub{font-size:0.65rem;color:var(--slate);letter-spacing:.05em;margin-bottom:0.4rem;}
.iri-stats{display:flex;flex-direction:column;gap:3px;}
.iri-stat{display:flex;justify-content:space-between;gap:1rem;font-size:0.68rem;}
.iri-stat span:first-child{color:var(--dark);}
.iri-stat span:last-child{color:var(--white);font-weight:600;}

/* Orbit hint */
.interior-hint{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);background:rgba(15,23,42,0.82);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.9rem;font-size:0.72rem;color:var(--slate);white-space:nowrap;backdrop-filter:blur(8px);pointer-events:none;}

/* ── 2D CANVAS OVERLAY CONTROLS ── */
.canvas-controls{position:absolute;bottom:1rem;right:1rem;display:flex;flex-direction:column;gap:0.4rem;z-index:10;}
.cc-btn{width:36px;height:36px;background:rgba(15,23,42,0.85);border:1px solid var(--border);border-radius:8px;color:var(--slate);font-size:0.85rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;backdrop-filter:blur(8px);}
.cc-btn:hover{border-color:var(--primary);color:var(--primary);}

/* ── WALKTHROUGH HUD ── */
.walk-hud{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);display:none;gap:0.4rem;z-index:20;}
.walk-btn{width:44px;height:44px;background:rgba(15,23,42,0.9);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:0.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;backdrop-filter:blur(8px);user-select:none;}
.walk-btn:hover,.walk-btn:active{background:rgba(0,212,200,0.2);border-color:var(--primary);}
.walk-center{width:52px;height:52px;font-size:1.1rem;}
.walk-hint{position:absolute;top:1rem;left:50%;transform:translateX(-50%);background:rgba(15,23,42,0.85);border:1px solid var(--border);border-radius:8px;padding:0.5rem 1rem;font-size:0.75rem;color:var(--slate);white-space:nowrap;backdrop-filter:blur(8px);}

/* ── MODE LABEL ── */
.mode-label{position:absolute;top:1rem;left:1rem;background:rgba(15,23,42,0.8);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.75rem;font-size:0.75rem;color:var(--slate);backdrop-filter:blur(8px);display:flex;align-items:center;gap:0.4rem;z-index:10;}
.mode-label i{color:var(--primary);}

/* ── PANEL TOGGLE ── */
.panel-toggle{position:absolute;top:50%;transform:translateY(-50%);left:0;width:16px;height:48px;background:var(--surface);border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:0.6rem;z-index:5;transition:all 0.15s;}
.panel-toggle:hover{color:var(--primary);}

/* ── LOADER / ERROR ── */
.loader-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1rem;}
.loader-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:0.9rem;color:var(--slate);}
.error-box{background:var(--surface);border:1px solid #ef4444;border-radius:12px;padding:2rem;text-align:center;max-width:400px;}
.error-box i{font-size:2rem;color:#ef4444;margin-bottom:1rem;display:block;}

/* ── ROOM LEGEND ── */
.room-legend{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.5rem;}
.room-chip{display:flex;align-items:center;gap:4px;font-size:0.68rem;color:var(--slate);background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 7px;}
.room-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ── 3D sub-view cam-preset buttons (same as architect.html) ── */
.cam-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:0;}
.cam-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#8899bb;border-radius:6px;padding:5px 4px;font-size:0.68rem;cursor:pointer;transition:all .18s;text-align:center;white-space:nowrap;}
.cam-btn:hover{background:rgba(0,212,200,0.18);color:var(--primary);}

/* ── Open-top label in viewtabs ── */
.open-top-toggle{display:none;align-items:center;gap:0.35rem;font-size:0.78rem;color:var(--slate);cursor:pointer;padding:0 0.5rem;white-space:nowrap;}
.open-top-toggle input{accent-color:var(--primary);}

/* ── Layer toggles strip ── */
.layer-strip{display:none;align-items:center;gap:0.6rem;padding:0 0.5rem;}
.layer-toggle{display:flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--slate);cursor:pointer;white-space:nowrap;}
.layer-toggle input{accent-color:var(--primary);}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .info-panel{display:none;}
  .topbar-arch{display:none;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a id="backBtn" href="javascript:history.back()" class="topbar-back"><i class="fas fa-arrow-left"></i> Back</a>
  <div class="topbar-sep"></div>
  <div class="topbar-logo">SmartArch</div>
  <div class="topbar-sep"></div>
  <div class="topbar-project" id="topbarProject">Loading project…</div>
  <div class="topbar-arch" id="topbarArch" style="display:none;">
    <img id="topbarArchAvatar" src="" alt="">
    <span id="topbarArchName"></span>
  </div>
  <!-- Download dropdown -->
  <div class="dl-wrap" id="dlWrap">
    <button class="dl-btn" onclick="toggleDlMenu(event)">
      <i class="fas fa-file-export"></i> Download <i class="fas fa-chevron-down" style="font-size:0.65rem;"></i>
    </button>
    <div class="dl-menu" id="dlMenu">
      <div class="dl-group-label">2D Plans</div>
      <button class="dl-option" onclick="doDownload('json')"><i class="fas fa-code"></i><span><strong>JSON</strong><small>Full project data</small></span></button>
      <button class="dl-option" onclick="doDownload('svg')"><i class="fas fa-draw-polygon"></i><span><strong>SVG</strong><small>Vector floor plan</small></span></button>
      <button class="dl-option" onclick="doDownload('png')"><i class="fas fa-image"></i><span><strong>PNG</strong><small>Floor plan image</small></span></button>
      <div class="dl-sep"></div>
      <div class="dl-group-label">3D Models</div>
      <button class="dl-option" onclick="doDownload('obj')"><i class="fas fa-cube"></i><span><strong>OBJ</strong><small>Universal 3D mesh</small></span></button>
      <button class="dl-option" onclick="doDownload('stl')"><i class="fas fa-print"></i><span><strong>STL</strong><small>3D printing ready</small></span></button>
      <button class="dl-option" onclick="doDownload('gltf')"><i class="fas fa-globe"></i><span><strong>glTF / GLB</strong><small>Web &amp; game engines</small></span></button>
    </div>
  </div>
</header>

<!-- VIEW MODE TABS -->
<nav class="viewtabs" id="viewtabs">
  <!-- 2D -->
  <button class="vtab active" id="tab-2d" onclick="switchMode('2d')"><i class="fas fa-th-large"></i> 2D Plan</button>
  <div class="vtab-sep"></div>
  <!-- 3D group -->
  <button class="vtab" id="tab-interior"   onclick="switchMode('interior')">  <i class="fas fa-home"></i>          Interior</button>
  <button class="vtab" id="tab-front"      onclick="switchMode('front')">     <i class="fas fa-sign-in-alt"></i>   Front</button>
  <button class="vtab" id="tab-back"       onclick="switchMode('back')">      <i class="fas fa-sign-out-alt"></i>  Back</button>
  <button class="vtab" id="tab-side"       onclick="switchMode('side')">      <i class="fas fa-arrows-alt-h"></i>  Side</button>
  <button class="vtab" id="tab-dollhouse"  onclick="switchMode('dollhouse')"> <i class="fas fa-border-all"></i>    Dollhouse</button>
  <button class="vtab" id="tab-exterior"   onclick="switchMode('exterior')">  <i class="fas fa-tree"></i>          Exterior</button>
  <button class="vtab" id="tab-wireframe"  onclick="switchMode('wireframe')"> <i class="fas fa-vector-square"></i> Wireframe</button>
  <div class="vtab-sep"></div>
  <button class="vtab" id="tab-walkthrough" onclick="switchMode('walkthrough')"><i class="fas fa-walking"></i> Walkthrough</button>
  <!-- Open top toggle (interior / dollhouse only) -->
  <label class="open-top-toggle" id="openTopToggle">
    <input type="checkbox" id="openTopChk" checked onchange="refreshInterior()"> Open Top
  </label>
  <!-- Layer strip (3D only) -->
  <div class="layer-strip" id="layerStrip">
    <label class="layer-toggle"><input type="checkbox" id="layerFurniture" checked onchange="toggleLayer('furniture',this.checked)"> <i class="fas fa-couch" style="color:#7c3aed;font-size:0.7rem;"></i> Furniture</label>
    <label class="layer-toggle"><input type="checkbox" id="layerRoof"                onchange="toggleLayer('roof',this.checked)">      <i class="fas fa-home"   style="color:#00d4c8;font-size:0.7rem;"></i> Roof</label>
    <label class="layer-toggle"><input type="checkbox" id="layerWalls" checked       onchange="toggleLayer('walls',this.checked)">     <i class="fas fa-border-style" style="color:#94a3b8;font-size:0.7rem;"></i> Walls</label>
    <label class="layer-toggle"><input type="checkbox" id="layerLabels" checked      onchange="toggleLayer('labels',this.checked)">    <i class="fas fa-tag"   style="color:#94a3b8;font-size:0.7rem;"></i> Labels</label>
  </div>
</nav>

<!-- BODY -->
<div class="viewer-body">

  <!-- INFO PANEL -->
  <aside class="info-panel" id="infoPanel">
    <div class="info-inner" id="infoInner">
      <div style="color:var(--slate);font-size:0.8rem;text-align:center;padding:2rem;">Loading…</div>
    </div>
    <!-- Cam presets (shown in 3D modes) -->
    <div id="camPresetArea" style="padding:0.75rem;border-top:1px solid var(--border);display:none;">
      <div style="font-size:0.68rem;color:var(--dark);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Camera Presets</div>
      <div class="cam-presets">
        <button class="cam-btn" onclick="setCamPreset('free')"  title="Free orbit"><i class="fas fa-redo"></i><br>Free</button>
        <button class="cam-btn" onclick="setCamPreset('front')" title="Front view"><i class="fas fa-sign-in-alt"></i><br>Front</button>
        <button class="cam-btn" onclick="setCamPreset('back')"  title="Back view"><i class="fas fa-sign-out-alt"></i><br>Back</button>
        <button class="cam-btn" onclick="setCamPreset('side')"  title="Side view"><i class="fas fa-arrows-alt-h"></i><br>Side</button>
        <button class="cam-btn" onclick="setCamPreset('top')"   title="Top view"><i class="fas fa-arrow-down"></i><br>Top</button>
        <button class="cam-btn" onclick="setCamPreset('interior')"title="Interior"><i class="fas fa-home"></i><br>Int.</button>
        <button class="cam-btn" onclick="setCamPreset('dollhouse')"title="Dollhouse"><i class="fas fa-border-all"></i><br>Doll</button>
        <button class="cam-btn" onclick="setCamPreset('exterior')"title="Exterior"><i class="fas fa-tree"></i><br>Ext.</button>
      </div>
    </div>
  </aside>

  <!-- PANEL TOGGLE -->
  <button class="panel-toggle" id="panelToggle" onclick="togglePanel()" title="Toggle info panel">
    <i class="fas fa-chevron-left" id="panelToggleIcon"></i>
  </button>

  <!-- CANVAS AREA -->
  <div class="canvas-wrap" id="canvasWrap">
    <!-- 2D canvas -->
    <canvas id="viewCanvas"></canvas>

    <!-- Interior 3D (uses interior.js engine — identical to architect.html) -->
    <div id="interiorContainer">
      <div class="interior-room-info" id="interiorRoomInfo">
        <div class="iri-name" id="iriName">—</div>
        <div class="iri-sub"  id="iriSub">SELECT A ROOM</div>
        <div class="iri-stats" id="iriStats"></div>
      </div>
      <canvas id="interiorCanvas"></canvas>
      <div class="interior-hint" id="interiorOrbitHint">Drag to orbit · Scroll to zoom · <kbd style="background:rgba(255,255,255,0.1);padding:1px 4px;border-radius:3px;">WASD</kbd> in Walkthrough</div>
    </div>

    <!-- Three.js (wireframe / legacy 3D) -->
    <div id="threeContainer"></div>

    <!-- Mode label -->
    <div class="mode-label" id="modeLabel"><i class="fas fa-th-large"></i> 2D Floor Plan</div>

    <!-- 2D controls -->
    <div class="canvas-controls" id="canvasControls">
      <div class="cc-btn" onclick="zoom2D(1.2)"  title="Zoom in"><i class="fas fa-plus"></i></div>
      <div class="cc-btn" onclick="zoom2D(0.83)" title="Zoom out"><i class="fas fa-minus"></i></div>
      <div class="cc-btn" onclick="reset2D()"    title="Reset view"><i class="fas fa-expand"></i></div>
    </div>

    <!-- Walkthrough HUD -->
    <div class="walk-hud" id="walkHud">
      <div style="display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:4px;">
        <div></div>
        <div class="walk-btn" onmousedown="wMove('fwd',true)" onmouseup="wMove('fwd',false)" ontouchstart="wMove('fwd',true)" ontouchend="wMove('fwd',false)"><i class="fas fa-arrow-up"></i></div>
        <div></div>
        <div class="walk-btn" onmousedown="wMove('left',true)" onmouseup="wMove('left',false)" ontouchstart="wMove('left',true)" ontouchend="wMove('left',false)"><i class="fas fa-arrow-left"></i></div>
        <div class="walk-btn walk-center" style="background:rgba(0,212,200,0.15);border-color:var(--primary)"><i class="fas fa-dot-circle" style="color:var(--primary)"></i></div>
        <div class="walk-btn" onmousedown="wMove('right',true)" onmouseup="wMove('right',false)" ontouchstart="wMove('right',true)" ontouchend="wMove('right',false)"><i class="fas fa-arrow-right"></i></div>
        <div></div>
        <div class="walk-btn" onmousedown="wMove('back',true)" onmouseup="wMove('back',false)" ontouchstart="wMove('back',true)" ontouchend="wMove('back',false)"><i class="fas fa-arrow-down"></i></div>
        <div></div>
      </div>
    </div>
    <div class="walk-hint" id="walkHint" style="display:none;">
      <i class="fas fa-mouse" style="margin-right:4px;"></i> Drag to look around · WASD or buttons to move
    </div>
  </div>
</div>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text" id="loaderText">Loading project…</div>
</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- INLINE OrbitControls (same as original) -->
<script>
(function(){
  if(typeof THREE==='undefined')return;
  THREE.OrbitControls=function(camera,domElement){
    this.camera=camera;this.domElement=domElement||document;
    this.enabled=true;this.target=new THREE.Vector3();
    this.minDistance=0;this.maxDistance=Infinity;
    this.enableDamping=false;this.dampingFactor=0.05;
    this.enableZoom=true;this.zoomSpeed=1.0;
    this.enableRotate=true;this.rotateSpeed=1.0;
    this.enablePan=true;this.panSpeed=1.0;
    var scope=this,EPS=0.000001,STATE={NONE:-1,ROTATE:0,DOLLY:1,PAN:2};
    var state=STATE.NONE,spherical=new THREE.Spherical(),sphericalDelta=new THREE.Spherical();
    var scale=1,panOffset=new THREE.Vector3(),rotateStart=new THREE.Vector2(),rotateEnd=new THREE.Vector2(),rotateDelta=new THREE.Vector2();
    var dollyStart=new THREE.Vector2(),dollyEnd=new THREE.Vector2(),dollyDelta=new THREE.Vector2();
    var panStart=new THREE.Vector2(),panEnd=new THREE.Vector2(),panDelta=new THREE.Vector2();
    function getZoomScale(){return Math.pow(0.95,scope.zoomSpeed);}
    function rotateLeft(a){sphericalDelta.theta-=a;}function rotateUp(a){sphericalDelta.phi-=a;}
    function dollyIn(s){scale/=s;}function dollyOut(s){scale*=s;}
    var panLeft=(function(){var v=new THREE.Vector3();return function(d,m){v.setFromMatrixColumn(m,0);v.multiplyScalar(-d);panOffset.add(v);}})();
    var panUp=(function(){var v=new THREE.Vector3();return function(d,m){v.setFromMatrixColumn(m,1);v.multiplyScalar(d);panOffset.add(v);}})();
    var pan=(function(){var offset=new THREE.Vector3();return function(dX,dY){var el=scope.domElement;if(camera.isPerspectiveCamera){var pos=camera.position;offset.copy(pos).sub(scope.target);var tD=offset.length();tD*=Math.tan(camera.fov/2*Math.PI/180);panLeft(2*dX*tD/el.clientHeight,camera.matrix);panUp(2*dY*tD/el.clientHeight,camera.matrix);}else{panLeft(dX*(camera.right-camera.left)/camera.zoom/el.clientWidth,camera.matrix);panUp(dY*(camera.top-camera.bottom)/camera.zoom/el.clientHeight,camera.matrix);}}})();
    this.update=(function(){var offset=new THREE.Vector3(),quat=new THREE.Quaternion().setFromUnitVectors(camera.up,new THREE.Vector3(0,1,0)),quatInv=quat.clone().invert(),lastPos=new THREE.Vector3(),lastQuat=new THREE.Quaternion();return function(){var pos=camera.position;offset.copy(pos).sub(scope.target);offset.applyQuaternion(quat);spherical.setFromVector3(offset);spherical.theta+=sphericalDelta.theta;spherical.phi+=sphericalDelta.phi;spherical.phi=Math.max(EPS,Math.min(Math.PI-EPS,spherical.phi));spherical.makeSafe();spherical.radius*=scale;spherical.radius=Math.max(scope.minDistance,Math.min(scope.maxDistance,spherical.radius));scope.target.add(panOffset);offset.setFromSpherical(spherical);offset.applyQuaternion(quatInv);camera.position.copy(scope.target).add(offset);camera.lookAt(scope.target);if(scope.enableDamping){sphericalDelta.theta*=(1-scope.dampingFactor);sphericalDelta.phi*=(1-scope.dampingFactor);panOffset.multiplyScalar(1-scope.dampingFactor);}else{sphericalDelta.set(0,0,0);panOffset.set(0,0,0);}scale=1;if(lastPos.distanceToSquared(camera.position)>EPS||8*(1-lastQuat.dot(camera.quaternion))>EPS){lastPos.copy(camera.position);lastQuat.copy(camera.quaternion);}return false;};})();
    this.dispose=function(){scope.domElement.removeEventListener('mousedown',onMouseDown);scope.domElement.removeEventListener('wheel',onWheel);scope.domElement.removeEventListener('touchstart',onTouchStart);scope.domElement.removeEventListener('touchend',onTouchEnd);scope.domElement.removeEventListener('touchmove',onTouchMove);document.removeEventListener('mousemove',onMouseMove);document.removeEventListener('mouseup',onMouseUp);};
    function onMouseDown(e){if(!scope.enabled)return;e.preventDefault();if(e.button===0){if(!scope.enableRotate)return;rotateStart.set(e.clientX,e.clientY);state=STATE.ROTATE;}else if(e.button===1){if(!scope.enableZoom)return;dollyStart.set(e.clientX,e.clientY);state=STATE.DOLLY;}else if(e.button===2){if(!scope.enablePan)return;panStart.set(e.clientX,e.clientY);state=STATE.PAN;}document.addEventListener('mousemove',onMouseMove,false);document.addEventListener('mouseup',onMouseUp,false);}
    function onMouseMove(e){if(!scope.enabled)return;e.preventDefault();if(state===STATE.ROTATE){rotateEnd.set(e.clientX,e.clientY);rotateDelta.subVectors(rotateEnd,rotateStart).multiplyScalar(scope.rotateSpeed);var el=scope.domElement;rotateLeft(2*Math.PI*rotateDelta.x/el.clientHeight);rotateUp(2*Math.PI*rotateDelta.y/el.clientHeight);rotateStart.copy(rotateEnd);}else if(state===STATE.DOLLY){dollyEnd.set(e.clientX,e.clientY);dollyDelta.subVectors(dollyEnd,dollyStart);if(dollyDelta.y>0)dollyIn(getZoomScale());else if(dollyDelta.y<0)dollyOut(getZoomScale());dollyStart.copy(dollyEnd);}else if(state===STATE.PAN){panEnd.set(e.clientX,e.clientY);panDelta.subVectors(panEnd,panStart).multiplyScalar(scope.panSpeed);pan(panDelta.x,panDelta.y);panStart.copy(panEnd);}scope.update();}
    function onMouseUp(){document.removeEventListener('mousemove',onMouseMove,false);document.removeEventListener('mouseup',onMouseUp,false);state=STATE.NONE;}
    function onWheel(e){if(!scope.enabled||!scope.enableZoom)return;e.preventDefault();e.deltaY<0?dollyOut(getZoomScale()):dollyIn(getZoomScale());scope.update();}
    var pointers=[];
    function onTouchStart(e){if(!scope.enabled)return;e.preventDefault();pointers=Array.from(e.touches);if(pointers.length===1){if(!scope.enableRotate)return;rotateStart.set(pointers[0].clientX,pointers[0].clientY);state=STATE.ROTATE;}else if(pointers.length===2){if(!scope.enableZoom)return;var dx=pointers[0].clientX-pointers[1].clientX,dy=pointers[0].clientY-pointers[1].clientY;dollyStart.set(0,Math.sqrt(dx*dx+dy*dy));state=STATE.DOLLY;}}
    function onTouchMove(e){if(!scope.enabled)return;e.preventDefault();pointers=Array.from(e.touches);if(state===STATE.ROTATE&&pointers.length===1){rotateEnd.set(pointers[0].clientX,pointers[0].clientY);rotateDelta.subVectors(rotateEnd,rotateStart).multiplyScalar(scope.rotateSpeed);var el=scope.domElement;rotateLeft(2*Math.PI*rotateDelta.x/el.clientHeight);rotateUp(2*Math.PI*rotateDelta.y/el.clientHeight);rotateStart.copy(rotateEnd);}else if(state===STATE.DOLLY&&pointers.length===2){var dx=pointers[0].clientX-pointers[1].clientX,dy=pointers[0].clientY-pointers[1].clientY;var dist=Math.sqrt(dx*dx+dy*dy);dollyEnd.set(0,dist);dollyDelta.set(0,Math.pow(dollyEnd.y/dollyStart.y,scope.zoomSpeed));dollyIn(dollyDelta.y);dollyStart.copy(dollyEnd);}scope.update();}
    function onTouchEnd(){state=STATE.NONE;}
    scope.domElement.addEventListener('mousedown',onMouseDown,false);scope.domElement.addEventListener('wheel',onWheel,{passive:false});scope.domElement.addEventListener('touchstart',onTouchStart,{passive:false});scope.domElement.addEventListener('touchend',onTouchEnd,false);scope.domElement.addEventListener('touchmove',onTouchMove,{passive:false});scope.domElement.addEventListener('contextmenu',function(e){e.preventDefault();},false);
    this.update();
  };
})();
</script>

<!-- ══════════════════ INTERIOR.JS ENGINE (VERBATIM — same as architect.html) ══════════════════ -->
<script>
// interior.js — Interior 3D Visualization Engine (Style-Aware)
// Identical rendering to architect.html
(function () {
    'use strict';

    let scene, camera, renderer, animId;
    let groups = { furniture: [], roof: [], walls: [], labels: [] };
    let layers = { furniture: true, roof: false, walls: true, labels: true };
    let interiorSubView = 'interior';
    let currentStyle = 'modern';

    const STYLE_THEMES = {
        modern:      { bg:0x0d1117, fog:0x0d1117, fogDensity:0.014, wallColor:0x2a3550, interiorWall:0xd5dce8, floorColor:0x3a4a6b, ceilColor:0xf0f4f8, groundColor:0x1a2535, ambientInt:0.45, sunInt:1.0, sunColor:0xffffff, accentLight:null, furnitureTint:1.0, exposure:1.0, wallRough:0.65, wallMetal:0.08 },
        minimalist:  { bg:0xf0f2f5, fog:0xf0f2f5, fogDensity:0.005, wallColor:0xfafafa, interiorWall:0xf5f5f5, floorColor:0xe0e0e0, ceilColor:0xffffff, groundColor:0xe0e4ea, ambientInt:0.75, sunInt:0.9, sunColor:0xfff8f0, accentLight:null, furnitureTint:1.0, exposure:1.15, wallRough:0.9, wallMetal:0.0 },
        traditional: { bg:0x1a120a, fog:0x1a120a, fogDensity:0.012, wallColor:0xc8997a, interiorWall:0xeadcc8, floorColor:0x8b6f47, ceilColor:0xf5ecd8, groundColor:0x2d3a20, ambientInt:0.5, sunInt:0.85, sunColor:0xffe4b5, accentLight:0xff9944, furnitureTint:1.0, exposure:0.95, wallRough:0.9, wallMetal:0.0 },
        luxury:      { bg:0x060608, fog:0x060608, fogDensity:0.018, wallColor:0x1a1a20, interiorWall:0x0d0d14, floorColor:0xb8a070, ceilColor:0x1a1a20, groundColor:0x111118, ambientInt:0.35, sunInt:0.6, sunColor:0xffd080, accentLight:0xffd700, furnitureTint:1.0, exposure:0.85, wallRough:0.35, wallMetal:0.3 },
    };

    const TYPE_COLOR = {
        living:{hex:0x7c6fe0,css:'#7c6fe0',floor:0x8b6b3d},bedroom:{hex:0x47b89c,css:'#47b89c',floor:0xc4a882},
        bathroom:{hex:0xe06f6f,css:'#e06f6f',floor:0xf0f0f0},kitchen:{hex:0xe0a847,css:'#e0a847',floor:0xc8c0b0},
        dining:{hex:0x9c6fe0,css:'#9c6fe0',floor:0xe8e0d0},office:{hex:0x6fa8e0,css:'#6fa8e0',floor:0x8b8070},
        garage:{hex:0x8a8070,css:'#8a8070',floor:0x707070},staircase:{hex:0xff9632,css:'#ff9632',floor:0xc8a870},
        other:{hex:0xaaaaaa,css:'#aaaaaa',floor:0x999999},
    };

    const WALL_H = 2.7, WT = 0.14;

    function mat(color, rough=0.75, metal=0.04){ return new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal,side:THREE.DoubleSide}); }
    function glassM(color=0x88ccee,opacity=0.35){ return new THREE.MeshStandardMaterial({color,transparent:true,opacity,roughness:0.05,metalness:0.1}); }

    function addMesh(geo,material,x,y,z,rx=0,ry=0,grp=null){
        const m=new THREE.Mesh(geo,material);
        m.position.set(x,y,z);m.rotation.set(rx,ry,0);
        m.castShadow=true;m.receiveShadow=true;scene.add(m);
        if(grp)groups[grp].push(m);return m;
    }
    function box(w,h,d,color,x,y,z,rough=0.75,grp=null,ry=0){return addMesh(new THREE.BoxGeometry(w,h,d),mat(color,rough),x,y,z,0,ry,grp);}
    function cyl(rt,rb,h,seg,color,x,y,z,grp=null){return addMesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat(color,0.8),x,y,z,0,0,grp);}

    let theta=0.6,phi=0.5,radius=30,targetTheta=0.6,targetPhi=0.5,targetRadius=30;
    let isDragging=false,prevX=0,prevY=0;
    let lookTarget=new THREE.Vector3(0,1.5,0),lookCurrent=new THREE.Vector3(0,1.5,0);

    window.initInteriorView = function(projectData){
        if(!projectData||typeof THREE==='undefined')return;
        currentStyle=projectData.style||'modern';
        const T=STYLE_THEMES[currentStyle]||STYLE_THEMES.modern;
        const container=document.getElementById('interiorContainer');
        const canvas=document.getElementById('interiorCanvas');
        if(animId)cancelAnimationFrame(animId);
        if(renderer){renderer.dispose();}
        groups={furniture:[],roof:[],walls:[],labels:[]};
        layers.furniture=document.getElementById('layerFurniture')?.checked!==false;
        layers.roof=document.getElementById('layerRoof')?.checked===true;
        layers.walls=document.getElementById('layerWalls')?.checked!==false;
        layers.labels=document.getElementById('layerLabels')?.checked!==false;
        const W=container.clientWidth||800,H=container.clientHeight||600;
        scene=new THREE.Scene();
        scene.background=new THREE.Color(T.bg);
        scene.fog=new THREE.FogExp2(T.fog,T.fogDensity);
        camera=new THREE.PerspectiveCamera(52,W/H,0.1,300);
        renderer=new THREE.WebGLRenderer({canvas,antialias:true});
        renderer.setPixelRatio(Math.min(devicePixelRatio,2));
        renderer.setSize(W,H);
        renderer.shadowMap.enabled=true;
        renderer.shadowMap.type=THREE.PCFSoftShadowMap;
        renderer.toneMapping=THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure=T.exposure||1.0;
        buildScene(projectData);
        setupInteriorMouseControls(canvas);
        updateCameraPosition();
        animate();
        window._interiorScene=scene;
        window._interiorCamera=camera;
        window._interiorRenderer=renderer;
        Object.keys(groups).forEach(k=>groups[k].forEach(m=>m.visible=layers[k]));
    };

    function buildScene(pd){
        const HW=pd.totalWidth,HD=pd.totalDepth,ox=-HW/2,oz=-HD/2;
        const T=STYLE_THEMES[currentStyle]||STYLE_THEMES.modern;
        const floors=pd.floors||[{rooms:[],height:WALL_H}];
        let totalH=0;floors.forEach(f=>{totalH+=f.height||WALL_H;});
        lookTarget.set(0,totalH*0.45,0);lookCurrent.set(0,totalH*0.45,0);
        targetRadius=Math.max(HW,HD)*1.5+totalH*0.4;radius=targetRadius;

        scene.add(new THREE.AmbientLight(0xffffff,T.ambientInt));
        const sun=new THREE.DirectionalLight(T.sunColor,T.sunInt);
        sun.position.set(25,totalH*3+25,20);sun.castShadow=true;
        sun.shadow.mapSize.set(2048,2048);
        const sc=Math.max(HW,HD)+20;
        ['left','right','top','bottom'].forEach((s,i)=>sun.shadow.camera[s]=[-sc,sc,sc,-sc][i]);
        sun.shadow.bias=-0.001;scene.add(sun);
        const fill=new THREE.DirectionalLight(currentStyle==='luxury'?0x334466:0x8899cc,0.25);
        fill.position.set(-15,totalH+10,-10);scene.add(fill);

        const groundMat=mat(T.groundColor,0.95,0);
        addMesh(new THREE.PlaneGeometry(120,120),groundMat,0,-0.06,0,-Math.PI/2);
        if(currentStyle==='modern'||currentStyle==='minimalist'){
            const gridC=currentStyle==='modern'?0x112233:0xcccccc;
            const grid=new THREE.GridHelper(80,80,gridC,gridC);
            grid.material.opacity=0.25;grid.material.transparent=true;grid.position.y=-0.04;scene.add(grid);
        }
        const slabColor=currentStyle==='luxury'?0x1a1a1a:0x555555;
        box(HW+0.4,0.22,HD+0.4,slabColor,0,0.11,0,0.9,'walls');
        const wMat=mat(T.wallColor,T.wallRough,T.wallMetal);
        const wMatI=mat(T.interiorWall,T.wallRough*1.05,0);
        const slabMat=mat(slabColor,0.7,0);
        const voidMat=mat(0x050508,1,0);

        function wall(w,h,d,x,y,z,inner=false,grp='walls'){
            const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),inner?wMatI:wMat);
            m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);if(grp)groups[grp].push(m);
        }

        let baseY=0.22;
        floors.forEach((floor,floorIdx)=>{
            const rooms=floor.rooms||[],floorH=floor.height||WALL_H,wy=baseY+floorH/2;
            if(floorIdx>0)box(HW+0.1,0.2,HD+0.1,slabColor,0,baseY-0.1,0,0.8,'walls');
            if(T.accentLight){const acc=new THREE.PointLight(T.accentLight,currentStyle==='luxury'?0.5:0.3,18);acc.position.set(0,baseY+floorH-0.5,0);scene.add(acc);}
            rooms.forEach(room=>{
                if(room.type==='staircase')return;
                const cx=ox+room.x+room.width/2,cz=oz+room.z+room.depth/2,rh=room.height||floorH;
                const lightColor=currentStyle==='luxury'?0xffd080:currentStyle==='traditional'?0xffe4a0:0xffffff;
                const lightInt=currentStyle==='minimalist'?0.7:0.55;
                const pl=new THREE.PointLight(lightColor,lightInt,Math.max(room.width,room.depth)*1.8,2);
                pl.position.set(cx,baseY+rh-0.35,cz);pl.userData.baseIntensity=lightInt;scene.add(pl);
            });
            const floorRough=currentStyle==='luxury'?0.25:currentStyle==='minimalist'?0.6:0.75;
            const floorMetal=currentStyle==='luxury'?0.3:0;
            rooms.forEach(room=>{
                if(room.type==='staircase')return;
                const cx=ox+room.x+room.width/2,cz=oz+room.z+room.depth/2;
                let fc=(TYPE_COLOR[room.type]||TYPE_COLOR.other).floor;
                if(currentStyle==='minimalist')fc=room.type==='bathroom'?0xf5f5f5:0xe8e8e8;
                else if(currentStyle==='luxury')fc=room.type==='bathroom'?0xd4c9b0:0xb8a878;
                else if(currentStyle==='traditional')fc=room.type==='bathroom'?0xe0d8c8:0x9b7a50;
                addMesh(new THREE.BoxGeometry(room.width-WT,0.05,room.depth-WT),mat(fc,floorRough,floorMetal),cx,baseY+0.03,cz,0,0,'walls');
            });
            wall(HW+WT*2,floorH,WT,0,wy,oz);
            wall(HW+WT*2,floorH,WT,0,wy,oz+HD);
            wall(WT,floorH,HD+WT*2,ox,wy,0);
            wall(WT,floorH,HD+WT*2,ox+HW,wy,0);
            buildInteriorWalls(rooms,HW,HD,ox,oz,wy,floorH);
            const ceilMesh=new THREE.Mesh(new THREE.BoxGeometry(HW+0.2,0.08,HD+0.2),mat(T.ceilColor,0.9,0));
            ceilMesh.position.set(0,baseY+floorH+0.04,0);scene.add(ceilMesh);groups.roof.push(ceilMesh);
            const floorHasUserWindows=rooms.some(r=>(r.windows||[]).length>0);
            if(floorHasUserWindows){rooms.forEach(room=>{(room.windows||[]).forEach(win=>{addInteriorWindow3D(room,win,ox,oz,baseY,floorH,voidMat);});});}
            else{buildWindows(rooms,HW,HD,ox,oz,baseY,floorH);}
            rooms.forEach(room=>{(room.doors||[]).forEach(door=>{addInteriorDoor3D(room,door,ox,oz,baseY,floorH,voidMat);});});
            rooms.forEach(room=>buildRoomFurniture(room,ox,oz,baseY));
            rooms.forEach(room=>buildLabel(room,ox,oz,baseY+floorH*0.52));
            if(floors.length>1)buildFloorBadge(floor,floorIdx,HW,HD,baseY,floorH);
            baseY+=floorH;
        });
        buildRoof(pd,HW,HD,ox,oz,baseY);
        if(currentStyle!=='minimalist'){
            [[-HW/2-4,-HD/2-3],[HW/2+3,-HD/2-2],[-HW/2-3,HD/2+2],[HW/2+4,HD/2+3],[0,-HD/2-5]].forEach(([x,z])=>buildTree(x,z));
        }
    }

    function addInteriorWindow3D(room,win,ox,oz,baseY,floorH,voidMat){
        const winH=1.1,winW=win.width||1.0,wallT=WT+0.06;
        const winY=baseY+floorH*0.55,pos=win.pos??0.5,wall=win.wall,isHoriz=wall==='top'||wall==='bottom';
        let wx,wz;
        switch(wall){case 'top':wx=ox+room.x+pos*room.width;wz=oz+room.z;break;case 'bottom':wx=ox+room.x+pos*room.width;wz=oz+room.z+room.depth;break;case 'left':wx=ox+room.x;wz=oz+room.z+pos*room.depth;break;case 'right':wx=ox+room.x+room.width;wz=oz+room.z+pos*room.depth;break;default:return;}
        const vW=isHoriz?winW:wallT,vD=isHoriz?wallT:winW;
        const voidM=new THREE.Mesh(new THREE.BoxGeometry(vW,winH,vD),voidMat);voidM.position.set(wx,winY,wz);scene.add(voidM);groups.walls.push(voidM);
        const frameC=currentStyle==='luxury'?0x998800:currentStyle==='traditional'?0x8b4513:0x333355;
        const fMat=mat(frameC,0.5,0.15);
        const fW=isHoriz?winW+0.12:wallT+0.05,fD=isHoriz?wallT+0.05:winW+0.12;
        [-1,1].forEach(s=>{const bar=new THREE.Mesh(new THREE.BoxGeometry(fW,0.07,fD),fMat);bar.position.set(wx,winY+s*(winH/2+0.035),wz);scene.add(bar);groups.walls.push(bar);});
        [-1,1].forEach(s=>{const upW=isHoriz?0.07:fW,upD=isHoriz?fD:0.07;const up=new THREE.Mesh(new THREE.BoxGeometry(upW,winH,upD),fMat);up.position.set(wx+(isHoriz?s*(winW/2+0.035):0),winY,wz+(isHoriz?0:s*(winW/2+0.035)));scene.add(up);groups.walls.push(up);});
        const glassMat=new THREE.MeshStandardMaterial({color:0x88eeff,roughness:0.05,metalness:0.1,transparent:true,opacity:0.38,side:THREE.DoubleSide});
        const gW=isHoriz?winW-0.08:wallT*0.4,gD=isHoriz?wallT*0.4:winW-0.08;
        [-0.5,0.5].forEach(offset=>{const g=new THREE.Mesh(new THREE.BoxGeometry(gW,winH/2-0.04,gD),glassMat);g.position.set(wx,winY+offset*(winH/2-0.02),wz);scene.add(g);groups.walls.push(g);});
    }

    function addInteriorDoor3D(room,door,ox,oz,baseY,floorH,voidMat){
        const doorH=2.1,doorW=door.width||0.9,wallT=WT+0.06;
        const pos=door.pos??0.5,wall=door.wall,isHoriz=wall==='top'||wall==='bottom';
        let dx,dz;
        switch(wall){case 'top':dx=ox+room.x+pos*room.width;dz=oz+room.z;break;case 'bottom':dx=ox+room.x+pos*room.width;dz=oz+room.z+room.depth;break;case 'left':dx=ox+room.x;dz=oz+room.z+pos*room.depth;break;case 'right':dx=ox+room.x+room.width;dz=oz+room.z+pos*room.depth;break;default:return;}
        const vW=isHoriz?doorW:wallT,vD=isHoriz?wallT:doorW;
        const vm=new THREE.Mesh(new THREE.BoxGeometry(vW,doorH,vD),voidMat);vm.position.set(dx,baseY+doorH/2,dz);scene.add(vm);groups.walls.push(vm);
        const frameC=currentStyle==='luxury'?0xaa8800:currentStyle==='traditional'?0x8b4513:0x333344;
        const fMat=mat(frameC,0.5,0.2);
        const fW=isHoriz?doorW+0.16:wallT+0.06,fD=isHoriz?wallT+0.06:doorW+0.16;
        const topBar=new THREE.Mesh(new THREE.BoxGeometry(fW,0.1,fD),fMat);topBar.position.set(dx,baseY+doorH+0.05,dz);scene.add(topBar);groups.walls.push(topBar);
        [-1,1].forEach(s=>{const upW=isHoriz?0.09:fW,upD=isHoriz?fD:0.09;const up=new THREE.Mesh(new THREE.BoxGeometry(upW,doorH,upD),fMat);up.position.set(dx+(isHoriz?s*(doorW/2+0.045):0),baseY+doorH/2,dz+(isHoriz?0:s*(doorW/2+0.045)));scene.add(up);groups.walls.push(up);});

        box(chW,0.06,chD,0x2a2a4a,cx,fl+0.46,cz-rd*0.2+dkD*0.72,0.6,'furniture');
        box(chW,0.55,0.06,0x2a2a4a,cx,fl+0.72,cz-rd*0.2+dkD*0.72+chD/2,0.6,'furniture');
        [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx,sz])=>box(0.04,0.46,0.04,0x1a1a3a,cx+sx*chW*0.42,fl+0.23,cz-rd*0.2+dkD*0.72+sz*chD*0.42,0.8,'furniture'));
        const shH=1.8,shD=0.32;
        box(0.85,shH,shD,0x2a1a0a,cx+rw*0.35,fl+shH/2,cz-rd*0.32,0.7,'furniture');
        [0.2,0.55,0.9,1.25,1.6].forEach(y=>{box(0.83,0.02,shD-0.04,0x3a2a1a,cx+rw*0.35,fl+y,cz-rd*0.32,0.5,'furniture');box(0.2,0.3,0.06,0x4466aa+Math.floor(Math.random()*0x222200),cx+rw*0.28+Math.random()*0.2,fl+y+0.17,cz-rd*0.32-shD/2+0.04,0.7,'furniture');});
    }

    function furnishDefault(cx,cz,fl,rw,rd){
        box(Math.min(rw*0.4,1.2),0.45,Math.min(rd*0.4,1.0),0x445566,cx,fl+0.225,cz,0.8,'furniture');
    }

    function buildLabel(room,ox,oz,labelY){
        const c=document.createElement('canvas');c.width=256;c.height=64;
        const ctx=c.getContext('2d');
        const col=(TYPE_COLOR[room.type]||TYPE_COLOR.other).css;
        ctx.fillStyle='rgba(10,14,30,0.0)';ctx.fillRect(0,0,256,64);
        ctx.fillStyle=col;ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(room.name||(room.type.charAt(0).toUpperCase()+room.type.slice(1)),128,32);
        const tex=new THREE.CanvasTexture(c);
        const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
        sp.scale.set(room.width*0.9,room.width*0.9*0.25,1);
        sp.position.set(ox+room.x+room.width/2,labelY,oz+room.z+room.depth/2);
        scene.add(sp);groups.labels.push(sp);
    }

    function buildTree(x,z){
        box(0.28,2.2,0.28,0x3a2510,x,1.1,z,0.95);
        cyl(1.1,0.08,1.5,7,0x2a5c2a,x,2.9,z);
        cyl(0.85,0.05,1.1,7,0x338833,x,3.8,z);
    }

    function setupInteriorMouseControls(canvas){
        canvas.addEventListener('mousedown',e=>{isDragging=true;prevX=e.clientX;prevY=e.clientY;});
        canvas.addEventListener('mouseup',()=>isDragging=false);
        canvas.addEventListener('mouseleave',()=>isDragging=false);
        canvas.addEventListener('mousemove',e=>{if(!isDragging)return;const dx=e.clientX-prevX,dy=e.clientY-prevY;targetTheta-=dx*0.005;targetPhi=Math.max(0.08,Math.min(1.45,targetPhi-dy*0.005));prevX=e.clientX;prevY=e.clientY;});
        canvas.addEventListener('wheel',e=>{targetRadius=Math.max(3,Math.min(60,targetRadius+e.deltaY*0.04));e.preventDefault();},{passive:false});
        canvas.addEventListener('touchstart',e=>{isDragging=true;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;});
        canvas.addEventListener('touchend',()=>isDragging=false);
        canvas.addEventListener('touchmove',e=>{if(!isDragging)return;const dx=e.touches[0].clientX-prevX,dy=e.touches[0].clientY-prevY;targetTheta-=dx*0.005;targetPhi=Math.max(0.08,Math.min(1.45,targetPhi-dy*0.005));prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;e.preventDefault();},{passive:false});
    }

    function updateCameraPosition(){
        if(window._fpMode)return;
        theta+=(targetTheta-theta)*0.07;phi+=(targetPhi-phi)*0.07;radius+=(targetRadius-radius)*0.07;
        lookCurrent.lerp(lookTarget,0.07);
        camera.position.set(lookCurrent.x+radius*Math.sin(theta)*Math.cos(phi),lookCurrent.y+radius*Math.sin(phi),lookCurrent.z+radius*Math.cos(theta)*Math.cos(phi));
        camera.lookAt(lookCurrent);
    }

    function animate(){
        animId=requestAnimationFrame(animate);
        updateCameraPosition();
        scene.children.forEach((c,i)=>{if(c.isPointLight&&c.userData.baseIntensity!==undefined){c.intensity=c.userData.baseIntensity+Math.sin(Date.now()*0.0008*(1+i*0.2)+i)*0.04;}});
        renderer.render(scene,camera);
        const cont=document.getElementById('interiorContainer');
        if(cont&&renderer){const w=cont.clientWidth,h=cont.clientHeight;if(renderer.domElement.width!==w*devicePixelRatio){renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}}
    }

    // ── Public API (mirrors architect.html / interior.js) ─────────────────────
    window.setInteriorCam=function(mode){
        if(mode==='top')  {targetPhi=1.45;targetRadius=35;}
        else if(mode==='front'){targetTheta=0;targetPhi=0.38;targetRadius=30;}
        else if(mode==='back') {targetTheta=Math.PI;targetPhi=0.38;targetRadius=30;}
        else if(mode==='side') {targetTheta=Math.PI/2;targetPhi=0.38;targetRadius=30;}
    };

    window.toggleInteriorLayer=function(name,visible){
        layers[name]=visible;if(groups[name])groups[name].forEach(m=>m.visible=visible);
    };

    window._setInteriorSubView=function(v){
        interiorSubView=v;
        if(v==='interior'){layers.roof=false;if(groups.roof)groups.roof.forEach(m=>m.visible=false);const lr=document.getElementById('layerRoof');if(lr)lr.checked=false;targetPhi=0.5;targetRadius=28;lookTarget.set(0,1.5,0);}
        else if(v==='dollhouse'){layers.roof=false;if(groups.roof)groups.roof.forEach(m=>m.visible=false);targetPhi=1.3;targetRadius=38;}
        else if(v==='exterior'){layers.roof=true;if(groups.roof)groups.roof.forEach(m=>m.visible=true);const lr=document.getElementById('layerRoof');if(lr)lr.checked=true;targetPhi=0.42;targetRadius=36;}
        else if(v==='front')  {targetTheta=0;   targetPhi=0.38;targetRadius=30;layers.roof=true;if(groups.roof)groups.roof.forEach(m=>m.visible=true);}
        else if(v==='back')   {targetTheta=Math.PI;targetPhi=0.38;targetRadius=30;layers.roof=true;if(groups.roof)groups.roof.forEach(m=>m.visible=true);}
        else if(v==='side')   {targetTheta=Math.PI/2;targetPhi=0.38;targetRadius=30;layers.roof=true;if(groups.roof)groups.roof.forEach(m=>m.visible=true);}
        window._interiorScene=scene;window._interiorCamera=camera;window._interiorRenderer=renderer;
    };
    window.setInteriorSubView=window._setInteriorSubView;
})();
</script>

<script>

let interiorActive = false;

async function init(){
  const params = new URLSearchParams(location.search);

  setLoader('Loading project…');
  const authToken = localStorage.getItem('client_token')||localStorage.getItem('token')||'';
  const headers   = authToken ? {'Authorization':'Bearer '+authToken} : {};
  try{
    const res  = await fetch(`${API}/shares/token/${token}`,{headers});

    if(!data.success){showError(data.message||'Could not load this project.');return;}

}

function setActiveFloor(idx){
  activeFloorIdx=idx;
  document.querySelectorAll('.floor-badge').forEach((b,i)=>b.classList.toggle('active',i===idx));
  if(currentMode==='2d')draw2D();
}

// ─────────────────────────────────────────────────────────────────────────────
//  MODE SWITCHING
// ─────────────────────────────────────────────────────────────────────────────
const MODE_META={
  '2d':         {icon:'fa-th-large',      label:'2D Floor Plan'},
  'interior':   {icon:'fa-home',          label:'Interior View'},
  'front':      {icon:'fa-sign-in-alt',   label:'Front View'},
  'back':       {icon:'fa-sign-out-alt',  label:'Back View'},
  'side':       {icon:'fa-arrows-alt-h',  label:'Side View'},
  'dollhouse':  {icon:'fa-border-all',    label:'Dollhouse View'},
  'exterior':   {icon:'fa-tree',          label:'Exterior View'},
  'wireframe':  {icon:'fa-vector-square', label:'Wireframe'},
  'walkthrough':{icon:'fa-walking',       label:'Walkthrough'},
};

// Interior-engine modes
const INTERIOR_MODES = new Set(['interior','front','back','side','dollhouse','exterior']);

function switchMode(mode){
  if(mode===currentMode)return;
  // cleanup previous
  cleanupThree();
  cleanupWalk();
  cleanupInterior();

  currentMode=mode;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  const tab=document.getElementById('tab-'+mode);if(tab)tab.classList.add('active');

  const meta=MODE_META[mode]||{icon:'fa-cube',label:mode};
  document.getElementById('modeLabel').innerHTML=`<i class="fas ${meta.icon}"></i> ${meta.label}`;

  const canvas2d  = document.getElementById('viewCanvas');
  const intDiv    = document.getElementById('interiorContainer');
  const threeDiv  = document.getElementById('threeContainer');
  const cc        = document.getElementById('canvasControls');
  const walkHud   = document.getElementById('walkHud');
  const walkHint  = document.getElementById('walkHint');
  const layerS    = document.getElementById('layerStrip');
  const openTopT  = document.getElementById('openTopToggle');
  const camPA     = document.getElementById('camPresetArea');

  // hide all
  canvas2d.style.display='none';
  intDiv.style.display='none';
  threeDiv.style.display='none';
  cc.style.display='none';
  walkHud.style.display='none';
  walkHint.style.display='none';
  layerS.style.display='none';
  openTopT.style.display='none';
  camPA.style.display='none';

  if(mode==='2d'){
    canvas2d.style.display='block';
    cc.style.display='flex';
    draw2D();
  } else if(INTERIOR_MODES.has(mode)){
    intDiv.style.display='block';
    layerS.style.display='flex';
    openTopT.style.display='flex';
    camPA.style.display='block';
    buildInterior(mode);
  } else if(mode==='wireframe'){
    threeDiv.style.display='block';
    buildThree(true,false);
  } else if(mode==='walkthrough'){
    threeDiv.style.display='block';
    walkHud.style.display='flex';
    walkHint.style.display='block';
    buildWalkthrough();
  }
}

function cleanupInterior(){
  if(window._interiorRenderer){window._interiorRenderer.dispose();}
  window._interiorRenderer=null;window._interiorScene=null;window._interiorCamera=null;
  interiorActive=false;
  const c=document.getElementById('interiorContainer');
  if(c){const canvas=c.querySelector('#interiorCanvas');if(canvas){const gl=canvas.getContext('webgl');if(gl)gl.getExtension('WEBGL_lose_context')?.loseContext();}}
}

function buildInterior(mode){
  if(!projectData)return;
  interiorActive=true;
  // Set open-top layer based on checkbox
  const openTop=document.getElementById('openTopChk')?.checked!==false;
  if(mode!=='interior'&&mode!=='dollhouse'){
    // exterior-ish views: show roof
    const lr=document.getElementById('layerRoof');if(lr)lr.checked=true;
  } else {
    const lr=document.getElementById('layerRoof');if(lr&&mode==='interior')lr.checked=false;
  }
  window.initInteriorView(projectData);
  // Apply sub-view camera
  if(window._setInteriorSubView)window._setInteriorSubView(mode);
}

function refreshInterior(){
  if(INTERIOR_MODES.has(currentMode)){
    cleanupInterior();
    setTimeout(()=>{
      document.getElementById('interiorContainer').style.display='block';
      buildInterior(currentMode);
    },50);
  }
}

function toggleLayer(name,visible){
  if(window.toggleInteriorLayer)window.toggleInteriorLayer(name,visible);
}

function setCamPreset(preset){
  if(INTERIOR_MODES.has(currentMode)){
    if(window._setInteriorSubView)window._setInteriorSubView(preset);
    if(window.setInteriorCam)window.setInteriorCam(preset);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  2D FLOOR PLAN
// ─────────────────────────────────────────────────────────────────────────────
const ROOM_COLORS={entrance:'#a0c4ff',living:'#bde0fe',dining:'#ffd6a5',kitchen:'#fdffb6',bedroom:'#caffbf',bathroom:'#9bf6ff',hallway:'#e0e0e0',office:'#c3b1e1',garage:'#d4a373',staircase:'#bbb',other:'#c8d6e5'};

function draw2D(){
  const canvas=document.getElementById('viewCanvas');
  const wrap=document.getElementById('canvasWrap');
  canvas.width=wrap.clientWidth||800;canvas.height=wrap.clientHeight||600;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const p=projectData,floor=(p.floors||[])[activeFloorIdx];
  if(!floor){ctx.fillStyle='#64748b';ctx.font='14px Inter';ctx.textAlign='center';ctx.fillText('No floor data',canvas.width/2,canvas.height/2);return;}
  const rooms=floor.rooms||[],W=p.totalWidth,D=p.totalDepth;
  const PAD=48,scaleX=(canvas.width-PAD*2)/W,scaleY=(canvas.height-PAD*2)/D;
  const baseScale=Math.min(scaleX,scaleY)*zoom2DScale;
  const offsetX=(canvas.width-W*baseScale)/2+pan2D.x,offsetY=(canvas.height-D*baseScale)/2+pan2D.y;
  const tX=x=>offsetX+x*baseScale,tY=y=>offsetY+y*baseScale,tW=w=>w*baseScale;
  ctx.fillStyle='#0a1020';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(30,41,59,0.6)';ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=2){ctx.beginPath();ctx.moveTo(tX(x),tY(0));ctx.lineTo(tX(x),tY(D));ctx.stroke();}
  for(let y=0;y<=D;y+=2){ctx.beginPath();ctx.moveTo(tX(0),tY(y));ctx.lineTo(tX(W),tY(y));ctx.stroke();}
  ctx.shadowColor='rgba(0,212,200,0.12)';ctx.shadowBlur=16;ctx.fillStyle='rgba(15,23,42,0.9)';ctx.fillRect(tX(0),tY(0),tW(W),tW(D));ctx.shadowBlur=0;
  rooms.forEach(room=>{
    const rx=tX(room.x),ry=tY(room.z||room.y||0),rw=tW(room.width),rh=tW(room.depth||room.height||0);
    const color=ROOM_COLORS[room.type]||'#aaa';
    ctx.fillStyle=hexToRgba(color,0.18);ctx.fillRect(rx,ry,rw,rh);
    ctx.strokeStyle=hexToRgba(color,0.7);ctx.lineWidth=1.5;ctx.strokeRect(rx,ry,rw,rh);
    const fs=Math.max(8,Math.min(12,rw/6));
    ctx.fillStyle=color;ctx.font=`600 ${fs}px Inter,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    const label=room.name||cap(room.type);if(rw>30&&rh>20)ctx.fillText(label,rx+rw/2,ry+rh/2);
    if(rw>50&&rh>28&&room.width&&(room.depth||room.height)){ctx.font=`400 ${Math.max(7,fs-2)}px Inter,sans-serif`;ctx.fillStyle=hexToRgba(color,0.55);ctx.fillText(`${room.width}×${room.depth||room.height}m`,rx+rw/2,ry+rh/2+fs+2);}
    (room.doors||[]).forEach(door=>drawDoor2D(ctx,room,door,tX,tY,tW,baseScale,color));
    (room.windows||[]).forEach(win=>drawWindow2D(ctx,room,win,tX,tY,tW,baseScale));
  });
  ctx.strokeStyle='#00d4c8';ctx.lineWidth=2.5;ctx.strokeRect(tX(0),tY(0),tW(W),tW(D));
  drawCompass(ctx,canvas.width-36,36,18);
  ctx.fillStyle='rgba(0,212,200,0.85)';ctx.font='700 11px Inter,sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText((floor.name||`Floor ${activeFloorIdx+1}`).toUpperCase(),tX(0)+4,tY(0)+4);
  drawScalebar(ctx,canvas,baseScale);
}

function drawDoor2D(ctx,room,door,tX,tY,tW,scale,color){
  const dw=tW(door.width||0.9),pos=door.pos??0.5,wall=door.wall;
  let x1,y1,x2,y2,arcX,arcY,startA,endA;
  const rx=tX(room.x),ry=tY(room.z||0),rw=tW(room.width),rh=tW(room.depth||room.height||0);
  ctx.strokeStyle=color;ctx.lineWidth=1.2;
  if(wall==='top')    {x1=rx+pos*rw-dw/2;y1=ry;x2=x1+dw;y2=ry;arcX=x1;arcY=ry;startA=0;endA=Math.PI/2;}
  else if(wall==='bottom'){x1=rx+pos*rw-dw/2;y1=ry+rh;x2=x1+dw;y2=ry+rh;arcX=x1;arcY=ry+rh;startA=-Math.PI/2;endA=0;}
  else if(wall==='left'){x1=rx;y1=ry+pos*rh-dw/2;x2=rx;y2=y1+dw;arcX=rx;arcY=y1;startA=0;endA=Math.PI/2;}
  else{x1=rx+rw;y1=ry+pos*rh-dw/2;x2=rx+rw;y2=y1+dw;arcX=rx+rw;arcY=y1;startA=Math.PI/2;endA=Math.PI;}
  if(x1===undefined)return;
  ctx.clearRect(Math.min(x1,x2)-1,Math.min(y1,y2)-1,Math.abs(x2-x1)+2,Math.abs(y2-y1)+2);
  ctx.beginPath();ctx.arc(arcX,arcY,dw,startA,endA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.stroke();
}

function drawWindow2D(ctx,room,win,tX,tY,tW,scale){
  const ww=tW(win.width||1.0),pos=win.pos??0.5,wall=win.wall;
  const rx=tX(room.x),ry=tY(room.z||0),rw=tW(room.width),rh=tW(room.depth||room.height||0);
  let x1,y1,x2,y2;
  if(wall==='top')    {x1=rx+pos*rw-ww/2;y1=ry-2;    x2=x1+ww;y2=ry+2;}
  else if(wall==='bottom'){x1=rx+pos*rw-ww/2;y1=ry+rh-2;x2=x1+ww;y2=ry+rh+2;}
  else if(wall==='left'){x1=rx-2;y1=ry+pos*rh-ww/2;x2=rx+2;y2=y1+ww;}
  else{x1=rx+rw-2;y1=ry+pos*rh-ww/2;x2=rx+rw+2;y2=y1+ww;}
  if(x1===undefined)return;
  ctx.fillStyle='rgba(136,238,255,0.55)';ctx.fillRect(x1,y1,x2-x1,y2-y1);
  ctx.strokeStyle='rgba(136,238,255,0.9)';ctx.lineWidth=1;ctx.strokeRect(x1,y1,x2-x1,y2-y1);
}

function drawCompass(ctx,cx,cy,r){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='rgba(15,23,42,0.7)';ctx.fill();
  ctx.strokeStyle='rgba(0,212,200,0.4)';ctx.lineWidth=1;ctx.stroke();
  [['N',0],['E',90],['S',180],['W',270]].forEach(([d,a])=>{
    const rad=(a-90)*Math.PI/180,x=cx+Math.cos(rad)*(r-4),y=cy+Math.sin(rad)*(r-4);
    ctx.fillStyle=d==='N'?'#00d4c8':'#475569';ctx.font=`700 ${d==='N'?9:7}px Inter,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d,x,y);
  });ctx.restore();
}

function drawScalebar(ctx,canvas,scale){
  const x=16,y=canvas.height-20,barM=5,barPx=barM*scale;
  ctx.fillStyle='rgba(15,23,42,0.7)';ctx.fillRect(x-4,y-10,barPx+8,16);
  ctx.strokeStyle='#00d4c8';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+barPx,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-4);ctx.lineTo(x,y+4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+barPx,y-4);ctx.lineTo(x+barPx,y+4);ctx.stroke();
  ctx.fillStyle='#94a3b8';ctx.font='700 9px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(`${barM}m`,x+barPx/2,y+3);
}

function buildThree(wireframe){
  cleanupThree();
  const container=document.getElementById('threeContainer');container.innerHTML='';
  const W3=container.clientWidth||800,H3=container.clientHeight||600;
  const p=projectData,{totalWidth:W,totalDepth:D,floors=[]}=p;
  const numFloors=floors.length,floorH=floors[0]?.height||2.7;
  let totalH=0;floors.forEach(f=>totalH+=f.height||floorH);
  const scene=new THREE.Scene();scene.background=new THREE.Color(0x0d1117);
  threeScene=scene;
  const camera=new THREE.PerspectiveCamera(50,W3/H3,0.1,800);

  camera.position.set(dist*0.7,dist*0.65,dist*0.7);camera.lookAt(0,totalH/2,0);

  container.appendChild(renderer.domElement);threeRenderer=renderer;
  const controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=0.06;controls.target.set(0,totalH/2,0);controls.minDistance=3;controls.maxDistance=300;controls.update();threeControls=controls;
  scene.add(new THREE.AmbientLight(0xffffff,wireframe?1.0:0.6));
  if(!wireframe){const sun=new THREE.DirectionalLight(0xffffff,1.0);sun.position.set(W*1.5,totalH*3+20,D*1.5);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);const sc=Math.max(W,D)+15;sun.shadow.camera.left=-sc;sun.shadow.camera.right=sc;sun.shadow.camera.top=sc;sun.shadow.camera.bottom=-sc;sun.shadow.camera.near=0.5;sun.shadow.camera.far=400;scene.add(sun);}
  function mat3(color,r=0.7,m=0){return wireframe?new THREE.MeshStandardMaterial({color:0x00d4c8,wireframe:true}):new THREE.MeshStandardMaterial({color,roughness:r,metalness:m});}
  const wallMat=mat3(0x3a4a6b,0.75,0.05),iWallMat=mat3(0xd0d8e8,0.8,0),slabMat=mat3(0x888888,0.7,0),roofMat=mat3(0x1a2040,0.7,0);
  if(!wireframe){const gm=new THREE.Mesh(new THREE.PlaneGeometry(120,120),mat3(0x1a2030,0.95,0));gm.rotation.x=-Math.PI/2;gm.position.y=-0.05;gm.receiveShadow=true;scene.add(gm);}
  function m(w,h,d,color,x,y,z,mat_){const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat_||mat3(color));mesh.position.set(x,y,z);mesh.castShadow=!wireframe;mesh.receiveShadow=!wireframe;scene.add(mesh);}
  const ox=-W/2,oz=-D/2;let baseY=0;
  floors.forEach((floor,fi)=>{
    const fh=floor.height||floorH,wy=baseY+fh/2;
    if(fi>0)m(W+0.1,0.2,D+0.1,0x888888,0,baseY-0.1,0,slabMat);
    m(W+0.28,fh,0.14,0,0,wy,oz,wallMat);m(W+0.28,fh,0.14,0,0,wy,oz+D,wallMat);m(0.14,fh,D+0.28,0,ox,wy,0,wallMat);m(0.14,fh,D+0.28,0,ox+W,wy,0,wallMat);
    (floor.rooms||[]).forEach(room=>{
      const iwt=0.12,rmx=ox+room.x,rmz=oz+(room.z||0),rmw=room.width,rmd=room.depth||3,rmh=room.height||fh;
      [[rmx+rmw/2,rmz-iwt/2,rmw,iwt],[rmx+rmw/2,rmz+rmd+iwt/2,rmw,iwt],[rmx-iwt/2,rmz+rmd/2,iwt,rmd],[rmx+rmw+iwt/2,rmz+rmd/2,iwt,rmd]].forEach(([x,z,w,d])=>{
        if(Math.abs(x)>W/2-0.3||Math.abs(z)>D/2-0.3)return;
        const iw=new THREE.Mesh(new THREE.BoxGeometry(w,rmh,d),iWallMat);iw.position.set(x,baseY+rmh/2,z);iw.receiveShadow=true;scene.add(iw);
      });
    });
    m(W+0.4,0.22,D+0.4,0,0,baseY+0.11,0,slabMat);
    baseY+=fh;
  });
  // Roof
  const rt=p.specifications?.roofType||'pitched';
  if(rt==='flat'){m(W+1.6,0.22,D+1.6,0,0,baseY+0.11,0,roofMat);}
  else{const pk=rt==='gambrel'?5.5:rt==='hip'?4.0:3.8,ov=0.8,rW=W/2+ov,rD=D/2+ov;const rv=new Float32Array([-rW,baseY,-rD,rW,baseY,-rD,rW,baseY,rD,-rW,baseY,rD,-rW,baseY+pk,0,rW,baseY+pk,0]);const ri=[0,1,5,0,5,4,2,3,4,2,4,5,0,4,3,1,5,2,0,3,2,0,2,1];const rg=new THREE.BufferGeometry();rg.setAttribute('position',new THREE.BufferAttribute(rv,3));rg.setIndex(ri);rg.computeVertexNormals();const rm=new THREE.Mesh(rg,roofMat);rm.castShadow=!wireframe;scene.add(rm);}
  function loop(){threeAnimId=requestAnimationFrame(loop);if(threeControls)threeControls.update();renderer.render(scene,camera);}
  loop();
  const onR=()=>{const nw=container.clientWidth||800,nh=container.clientHeight||600;camera.aspect=nw/nh;camera.updateProjectionMatrix();renderer.setSize(nw,nh);};

  threeScene=null;threeRenderer=null;threeCamera=null;threeControls=null;threeAnimId=null;
  const c=document.getElementById('threeContainer');if(c)c.innerHTML='';

function buildWalkthrough(){
  cleanupWalk();
  const container=document.getElementById('threeContainer');container.innerHTML='';
  const p=projectData,{totalWidth:W,totalDepth:D,floors=[]}=p;
  const fh=floors[0]?.height||2.7;let totalH=0;floors.forEach(f=>totalH+=f.height||fh);
  const scene=new THREE.Scene();scene.background=new THREE.Color(0x0d1117);scene.fog=new THREE.FogExp2(0x0d1117,0.015);
  walkScene=scene;
  const camera=new THREE.PerspectiveCamera(75,(container.clientWidth||800)/(container.clientHeight||600),0.1,100);
  walkCamera=camera;walkPos={x:0,y:1.65,z:0};walkYaw=0;walkPitch=0;applyWalkCamera();
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(container.clientWidth||800,container.clientHeight||600);
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.0;
  renderer.domElement.style.cssText='display:block;width:100%;height:100%;position:absolute;top:0;left:0;';
  container.appendChild(renderer.domElement);walkRenderer=renderer;
  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  const sun=new THREE.DirectionalLight(0xffffff,0.9);sun.position.set(15,totalH*3,10);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);const sc=Math.max(W,D)+15;sun.shadow.camera.left=-sc;sun.shadow.camera.right=sc;sun.shadow.camera.top=sc;sun.shadow.camera.bottom=-sc;scene.add(sun);
  const fill=new THREE.DirectionalLight(0x8899cc,0.25);fill.position.set(-15,10,-10);scene.add(fill);
  function stdMat(c,r=0.7,m=0){return new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});}
  const wallMat=stdMat(0x3a4a6b,0.75,0.05),iWallMat=stdMat(0xd5dce8,0.65,0);
  const ox=-W/2,oz=-D/2;let baseY=0.22;
  // Ground
  const gm=new THREE.Mesh(new THREE.PlaneGeometry(120,120),stdMat(0x1a2030,0.95));gm.rotation.x=-Math.PI/2;gm.position.y=-0.05;gm.receiveShadow=true;scene.add(gm);
  const grid=new THREE.GridHelper(80,80,0x112233,0x112233);grid.material.opacity=0.3;grid.material.transparent=true;grid.position.y=-0.04;scene.add(grid);
  floors.forEach((floor,fi)=>{
    const thisFH=floor.height||fh,wy=baseY+thisFH/2;
    // Outer walls
    [[W+0.28,thisFH,0.14,0,wy,oz],[W+0.28,thisFH,0.14,0,wy,oz+D],[0.14,thisFH,D+0.28,ox,wy,0],[0.14,thisFH,D+0.28,ox+W,wy,0]].forEach(([w,h,d,x,y,z])=>{const wall=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),wallMat);wall.position.set(x,y,z);wall.castShadow=true;wall.receiveShadow=true;scene.add(wall);});
    // Floor slab
    const fs=new THREE.Mesh(new THREE.BoxGeometry(W,0.1,D),stdMat(0x444444,0.7));fs.position.set(0,baseY-0.05,0);fs.receiveShadow=true;scene.add(fs);
    // Interior walls
    floor.rooms.forEach(room=>{
      const iwt=0.12,rmx=ox+room.x,rmz=oz+(room.z||0),rmw=room.width,rmd=room.depth||3,rmh=room.height||thisFH;
      [[rmx+rmw/2,rmz-iwt/2,rmw,iwt],[rmx+rmw/2,rmz+rmd+iwt/2,rmw,iwt],[rmx-iwt/2,rmz+rmd/2,iwt,rmd],[rmx+rmw+iwt/2,rmz+rmd/2,iwt,rmd]].forEach(([x,z,w,d])=>{
        if(Math.abs(x)>W/2-0.3||Math.abs(z)>D/2-0.3)return;
        const iw=new THREE.Mesh(new THREE.BoxGeometry(w,rmh,d),iWallMat);iw.position.set(x,baseY+rmh/2,z);iw.receiveShadow=true;scene.add(iw);
      });
      // Per-room floor
      const rfColor=({bathroom:0x87ceeb,kitchen:0xf5deb3,bedroom:0x8fbc8f,living:0x9eb8d4})[room.type]||0x556070;
      const rfm=new THREE.Mesh(new THREE.BoxGeometry(rmw-0.1,0.05,rmd-0.1),stdMat(rfColor,0.6,0));
      rfm.position.set(ox+room.x+rmw/2,baseY+0.02,oz+(room.z||0)+rmd/2);rfm.receiveShadow=true;scene.add(rfm);
    });
    baseY+=thisFH;
  });
  container.addEventListener('click',()=>{if(document.pointerLockElement!==container)container.requestPointerLock();});
  document.addEventListener('mousemove',onWalkMouseMove);
  document.addEventListener('keydown',onWalkKeyDown);document.addEventListener('keyup',onWalkKeyUp);
  let last=0;
  function anim(ts){walkAnimId=requestAnimationFrame(anim);const dt=Math.min((ts-last)/1000,0.05);last=ts;updateWalkMovement(dt,W,D,fh);renderer.render(scene,camera);}
  requestAnimationFrame(ts=>{last=ts;anim(ts);});
  const onR=()=>{const nw=container.clientWidth||800,nh=container.clientHeight||600;camera.aspect=nw/nh;camera.updateProjectionMatrix();renderer.setSize(nw,nh);};
  window.addEventListener('resize',onR);renderer._resizeListener=onR;
}

function onWalkMouseMove(e){if(document.pointerLockElement){walkYaw-=e.movementX*0.002;walkPitch=Math.max(-1.2,Math.min(1.2,walkPitch-e.movementY*0.002));applyWalkCamera();}}
function onWalkKeyDown(e){walkKeys[e.key.toLowerCase()]=true;}
function onWalkKeyUp(e){walkKeys[e.key.toLowerCase()]=false;}
const _walkMoving={};
function wMove(dir,active){_walkMoving[dir]=active;}

function updateWalkMovement(dt,W,D,fh){
  const speed=4;let mx=0,mz=0;
  if(walkKeys['w']||walkKeys['arrowup']||_walkMoving['fwd'])  mz=-1;
  if(walkKeys['s']||walkKeys['arrowdown']||_walkMoving['back']) mz=1;
  if(walkKeys['a']||walkKeys['arrowleft']||_walkMoving['left']) mx=-1;
  if(walkKeys['d']||walkKeys['arrowright']||_walkMoving['right'])mx=1;
  const cos=Math.cos(walkYaw),sin=Math.sin(walkYaw);
  walkPos.x+=(mx*cos-mz*sin)*speed*dt;walkPos.z+=(mx*sin+mz*cos)*speed*dt;
  walkPos.x=Math.max(-W/2+0.4,Math.min(W/2-0.4,walkPos.x));walkPos.z=Math.max(-D/2+0.4,Math.min(D/2-0.4,walkPos.z));
  applyWalkCamera();
}
function applyWalkCamera(){if(!walkCamera)return;walkCamera.position.set(walkPos.x,walkPos.y,walkPos.z);walkCamera.rotation.order='YXZ';walkCamera.rotation.y=walkYaw;walkCamera.rotation.x=walkPitch;}

function cleanupWalk(){
  if(walkAnimId)cancelAnimationFrame(walkAnimId);
  document.removeEventListener('mousemove',onWalkMouseMove);
  document.removeEventListener('keydown',onWalkKeyDown);document.removeEventListener('keyup',onWalkKeyUp);
  if(walkRenderer){if(walkRenderer._resizeListener)window.removeEventListener('resize',walkRenderer._resizeListener);walkRenderer.dispose();}
  walkScene=null;walkRenderer=null;walkCamera=null;walkAnimId=null;walkKeys={};
  Object.keys(_walkMoving).forEach(k=>delete _walkMoving[k]);
}

function toggleDlMenu(e){
  e.stopPropagation();
  document.getElementById('dlMenu').classList.toggle('open');

document.addEventListener('click',()=>document.getElementById('dlMenu')?.classList.remove('open'));

async function doDownload(fmt){
  document.getElementById('dlMenu').classList.remove('open');
  if(!projectData){alert('No project loaded.');return;}
  const safeName=(projectData.name||'project').replace(/[^a-z0-9_\-\s]/gi,'_').trim();

  if(fmt==='json'){
    const blob=new Blob([JSON.stringify(projectData,null,2)],{type:'application/json'});
    saveBlob(blob,`${safeName}.json`);return;
  }
  if(fmt==='png'){
    // Render current 2D to PNG
    const canvas=document.getElementById('viewCanvas');
    if(currentMode==='2d'){canvas.toBlob(b=>saveBlob(b,`${safeName}_floorplan.png`));}
    else{alert('Switch to 2D Plan view to download PNG.');}return;
  }
  if(fmt==='svg'){
    const p=projectData,floor=(p.floors||[])[activeFloorIdx];
    if(!floor){alert('No floor data.');return;}
    const W=p.totalWidth,D=p.totalDepth,S=30,PAD=40;
    const tw=W*S+PAD*2,th=D*S+PAD*2;
    const ROOM_COLORS_SVG={entrance:'#a0c4ff',living:'#bde0fe',dining:'#ffd6a5',kitchen:'#fdffb6',bedroom:'#caffbf',bathroom:'#9bf6ff',hallway:'#e0e0e0',office:'#c3b1e1',garage:'#d4a373',staircase:'#bbb',other:'#c8d6e5'};
    let rects=(floor.rooms||[]).map(r=>{const c=ROOM_COLORS_SVG[r.type]||'#aaa';const rx=PAD+r.x*S,ry=PAD+(r.z||0)*S,rw=r.width*S,rh=(r.depth||3)*S;return`<rect x="${rx}" y="${ry}" width="${rw}" height="${rh}" fill="${c}" fill-opacity="0.3" stroke="${c}" stroke-width="1.5"/><text x="${rx+rw/2}" y="${ry+rh/2}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="600" fill="${c}">${r.name||cap(r.type)}</text>`;}).join('');
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${tw} ${th}" width="${tw}" height="${th}"><rect width="100%" height="100%" fill="#0a1020"/><rect x="${PAD}" y="${PAD}" width="${W*S}" height="${D*S}" fill="rgba(15,23,42,0.9)" stroke="#00d4c8" stroke-width="2"/>${rects}<text x="${tw/2}" y="${th-10}" text-anchor="middle" font-size="9" fill="#64748b">${projectData.name} — SmartArch</text></svg>`;
    saveBlob(new Blob([svg],{type:'image/svg+xml'}),`${safeName}_floorplan.svg`);return;
  }

  // 3D exports — proxy to AI backend
  const AI_BASE='http://localhost:3001/api/architecture';
  const ENDPOINT={obj:'export/obj',stl:'export/stl',gltf:'export/gltf'}[fmt];
  if(!ENDPOINT){alert('Unknown format.');return;}
  setLoader(`Generating ${fmt.toUpperCase()}…`);
  try{
    const res=await fetch(`${AI_BASE}/${ENDPOINT}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(projectData)});
    if(!res.ok)throw new Error(`Server error ${res.status}`);
    if(fmt==='obj'){
      const data=await res.json();
      if(data.obj) saveBlob(new Blob([data.obj],{type:'text/plain'}),`${safeName}.obj`);
      if(data.mtl) saveBlob(new Blob([data.mtl],{type:'text/plain'}),`${safeName}.mtl`);
    } else {
      const blob=await res.blob();
      saveBlob(blob,`${safeName}.${fmt==='gltf'?'glb':fmt}`);
    }
  }catch(err){alert(`Download failed: ${err.message}. Make sure the AI backend (port 3001) is running.`);}
  finally{hideLoader();}
}

function saveBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}

function hideLoader(){document.getElementById('loader').style.display='none';}
function showError(msg){document.getElementById('loader').innerHTML=`<div class="error-box"><i class="fas fa-exclamation-circle"></i><div style="font-size:1rem;font-weight:600;margin-bottom:0.5rem;">Could Not Load Project</div><div style="font-size:0.85rem;color:#94a3b8;">${esc(msg)}</div><button onclick="history.back()" style="margin-top:1.25rem;background:linear-gradient(135deg,#00d4c8,#7c3aed);color:#fff;border:none;border-radius:8px;padding:0.5rem 1.25rem;cursor:pointer;font-size:0.85rem;font-weight:600;">Go Back</button></div>`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function hexToRgba(hex,alpha){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${alpha})`;}

window.addEventListener('resize',()=>{if(currentMode==='2d')draw2D();});

// ─────────────────────────────────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────────────────────────────────
init();
</script>
