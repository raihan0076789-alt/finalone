<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartArch — Project Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060a12;--surface:#0f172a;--border:#1e293b;
  --primary:#00d4c8;--violet:#7c3aed;--white:#f1f5f9;
  --slate:#94a3b8;--dark:#64748b;
}
body{background:var(--bg);color:var(--white);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{height:54px;background:rgba(9,14,26,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:1rem;flex-shrink:0;z-index:100;}
.topbar-logo{font-size:1.05rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--violet));background-clip: text;-webkit-background-clip: text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.topbar-sep{width:1px;height:22px;background:var(--border);}
.topbar-project{font-size:0.9rem;font-weight:600;color:var(--white);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar-arch{font-size:0.78rem;color:var(--slate);display:flex;align-items:center;gap:0.4rem;white-space:nowrap;}
.topbar-arch img{width:22px;height:22px;border-radius:50%;object-fit:cover;border:1.5px solid var(--violet);}
.topbar-back{color:var(--slate);text-decoration:none;font-size:0.8rem;display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.75rem;border:1px solid var(--border);border-radius:7px;transition:all 0.15s;}
.topbar-back:hover{border-color:var(--primary);color:var(--primary);}

/* ── VIEW MODE TABS ── */
.viewtabs{height:46px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:0.25rem;flex-shrink:0;overflow-x:auto;}
.viewtabs::-webkit-scrollbar{display:none;}
.vtab{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.9rem;border-radius:7px;border:none;background:none;color:var(--slate);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;outline:none;}
.vtab:hover{background:var(--border);color:var(--white);}
.vtab.active{background:linear-gradient(135deg,rgba(0,212,200,0.18),rgba(124,58,237,0.18));color:var(--primary);border:1px solid rgba(0,212,200,0.25);}
.vtab i{font-size:0.85rem;}

/* ── MAIN LAYOUT ── */
.viewer-body{flex:1;display:flex;overflow:hidden;position:relative;}

/* ── LEFT INFO PANEL ── */
.info-panel{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width 0.22s;}
.info-panel.collapsed{width:0;min-width:0;border:none;}
.info-inner{padding:1rem;overflow-y:auto;flex:1;}
.info-inner::-webkit-scrollbar{width:4px;}
.info-inner::-webkit-scrollbar-track{background:transparent;}
.info-inner::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px;}
.info-section{margin-bottom:1.25rem;}
.info-section-title{font-size:0.7rem;font-weight:700;color:var(--dark);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border);}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:0.3rem 0;border-bottom:1px solid rgba(30,41,59,0.5);}
.info-row:last-child{border:none;}
.info-lbl{font-size:0.75rem;color:var(--slate);}
.info-val{font-size:0.78rem;font-weight:600;color:var(--white);}
.arch-card-mini{display:flex;align-items:center;gap:0.6rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.65rem;}
.arch-mini-name{font-size:0.82rem;font-weight:700;color:var(--white);}
.arch-mini-spec{font-size:0.72rem;color:var(--slate);}
.msg-box{background:var(--bg);border-left:3px solid var(--violet);border-radius:0 8px 8px 0;padding:0.65rem 0.75rem;font-size:0.78rem;color:var(--slate);font-style:italic;line-height:1.5;}
.floor-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,212,200,0.1);color:var(--primary);border:1px solid rgba(0,212,200,0.2);border-radius:6px;padding:2px 9px;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.floor-badge:hover,.floor-badge.active{background:rgba(0,212,200,0.2);}
.floor-badges{display:flex;flex-wrap:wrap;gap:0.35rem;}

/* ── CANVAS AREA ── */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);}
#viewCanvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}
#threeContainer{position:absolute;inset:0;display:none;}

/* ── 2D CANVAS OVERLAY CONTROLS ── */
.canvas-controls{position:absolute;bottom:1rem;right:1rem;display:flex;flex-direction:column;gap:0.4rem;z-index:10;}
.cc-btn{width:36px;height:36px;background:rgba(15,23,42,0.85);border:1px solid var(--border);border-radius:8px;color:var(--slate);font-size:0.85rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;backdrop-filter:blur(8px);}
.cc-btn:hover{border-color:var(--primary);color:var(--primary);}

/* ── WALKTHROUGH HUD ── */
.walk-hud{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);display:none;gap:0.4rem;z-index:20;}
.walk-btn{width:44px;height:44px;background:rgba(15,23,42,0.9);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:0.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;backdrop-filter:blur(8px);user-select:none;}
.walk-btn:hover,.walk-btn:active{background:rgba(0,212,200,0.2);border-color:var(--primary);}
.walk-center{width:52px;height:52px;font-size:1.1rem;}
.walk-hint{position:absolute;top:1rem;left:50%;transform:translateX(-50%);background:rgba(15,23,42,0.85);border:1px solid var(--border);border-radius:8px;padding:0.5rem 1rem;font-size:0.75rem;color:var(--slate);white-space:nowrap;backdrop-filter:blur(8px);}

/* ── MODE LABEL ── */
.mode-label{position:absolute;top:1rem;left:1rem;background:rgba(15,23,42,0.8);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.75rem;font-size:0.75rem;color:var(--slate);backdrop-filter:blur(8px);display:flex;align-items:center;gap:0.4rem;}
.mode-label i{color:var(--primary);}

/* ── PANEL TOGGLE ── */
.panel-toggle{position:absolute;top:50%;transform:translateY(-50%);left:0;width:16px;height:48px;background:var(--surface);border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:0.6rem;z-index:5;transition:all 0.15s;}
.panel-toggle:hover{color:var(--primary);}

/* ── LOADER / ERROR ── */
.loader-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1rem;}
.loader-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:0.9rem;color:var(--slate);}
.error-box{background:var(--surface);border:1px solid #ef4444;border-radius:12px;padding:2rem;text-align:center;max-width:400px;}
.error-box i{font-size:2rem;color:#ef4444;margin-bottom:1rem;display:block;}

/* ── ROOM LEGEND ── */
.room-legend{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.5rem;}
.room-chip{display:flex;align-items:center;gap:4px;font-size:0.68rem;color:var(--slate);background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 7px;}
.room-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .info-panel{display:none;}
  .topbar-arch{display:none;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a id="backBtn" href="javascript:history.back()" class="topbar-back"><i class="fas fa-arrow-left"></i> Back</a>
  <div class="topbar-sep"></div>
  <div class="topbar-logo">SmartArch</div>
  <div class="topbar-sep"></div>
  <div class="topbar-project" id="topbarProject">Loading project…</div>
  <div class="topbar-arch" id="topbarArch" style="display:none;">
    <img id="topbarArchAvatar" src="" alt="">
    <span id="topbarArchName"></span>
  </div>
</header>

<!-- VIEW MODE TABS -->
<nav class="viewtabs" id="viewtabs">
  <button class="vtab active" id="tab-2d"        onclick="switchMode('2d')">        <i class="fas fa-th-large"></i>      2D Plan</button>
  <button class="vtab"        id="tab-3d"        onclick="switchMode('3d')">        <i class="fas fa-cube"></i>          3D View</button>
  <button class="vtab"        id="tab-wireframe" onclick="switchMode('wireframe')"> <i class="fas fa-vector-square"></i> Wireframe</button>
  <button class="vtab"        id="tab-walkthrough" onclick="switchMode('walkthrough')"><i class="fas fa-walking"></i>   Walkthrough</button>
  <button class="vtab"        id="tab-dollhouse" onclick="switchMode('dollhouse')"> <i class="fas fa-home"></i>          Dollhouse</button>
</nav>

<!-- BODY -->
<div class="viewer-body">

  <!-- INFO PANEL -->
  <aside class="info-panel" id="infoPanel">
    <div class="info-inner" id="infoInner">
      <div style="color:var(--slate);font-size:0.8rem;text-align:center;padding:2rem;">Loading…</div>
    </div>
  </aside>

  <!-- PANEL TOGGLE -->
  <button class="panel-toggle" id="panelToggle" onclick="togglePanel()" title="Toggle info panel">
    <i class="fas fa-chevron-left" id="panelToggleIcon"></i>
  </button>

  <!-- CANVAS AREA -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="viewCanvas"></canvas>
    <div id="threeContainer"></div>

    <!-- Mode label -->
    <div class="mode-label" id="modeLabel"><i class="fas fa-th-large"></i> 2D Floor Plan</div>

    <!-- 2D controls -->
    <div class="canvas-controls" id="canvasControls">
      <div class="cc-btn" onclick="zoom2D(1.2)" title="Zoom in"><i class="fas fa-plus"></i></div>
      <div class="cc-btn" onclick="zoom2D(0.83)" title="Zoom out"><i class="fas fa-minus"></i></div>
      <div class="cc-btn" onclick="reset2D()" title="Reset view"><i class="fas fa-expand"></i></div>
    </div>

    <!-- Walkthrough HUD -->
    <div class="walk-hud" id="walkHud">
      <div style="display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:4px;">
        <div></div>
        <div class="walk-btn" onmousedown="wMove('fwd',true)" onmouseup="wMove('fwd',false)" ontouchstart="wMove('fwd',true)" ontouchend="wMove('fwd',false)"><i class="fas fa-arrow-up"></i></div>
        <div></div>
        <div class="walk-btn" onmousedown="wMove('left',true)" onmouseup="wMove('left',false)" ontouchstart="wMove('left',true)" ontouchend="wMove('left',false)"><i class="fas fa-arrow-left"></i></div>
        <div class="walk-btn walk-center" style="background:rgba(0,212,200,0.15);border-color:var(--primary)"><i class="fas fa-dot-circle" style="color:var(--primary)"></i></div>
        <div class="walk-btn" onmousedown="wMove('right',true)" onmouseup="wMove('right',false)" ontouchstart="wMove('right',true)" ontouchend="wMove('right',false)"><i class="fas fa-arrow-right"></i></div>
        <div></div>
        <div class="walk-btn" onmousedown="wMove('back',true)" onmouseup="wMove('back',false)" ontouchstart="wMove('back',true)" ontouchend="wMove('back',false)"><i class="fas fa-arrow-down"></i></div>
        <div></div>
      </div>
    </div>
    <div class="walk-hint" id="walkHint" style="display:none;">
      <i class="fas fa-mouse" style="margin-right:4px;"></i> Drag to look around · Use buttons or WASD to move
    </div>
  </div>
</div>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text" id="loaderText">Loading project…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
//  ORBIT CONTROLS (inline — same as architect.html)
// ─────────────────────────────────────────────────────────────────────────────
(function(){
  if(typeof THREE==='undefined')return;
  THREE.OrbitControls=function(camera,domElement){
    this.camera=camera;this.domElement=domElement||document;
    this.enabled=true;this.target=new THREE.Vector3();
    this.minDistance=0;this.maxDistance=Infinity;
    this.enableDamping=false;this.dampingFactor=0.05;
    this.enableZoom=true;this.zoomSpeed=1.0;
    this.enableRotate=true;this.rotateSpeed=1.0;
    this.enablePan=true;this.panSpeed=1.0;
    var scope=this,EPS=0.000001,STATE={NONE:-1,ROTATE:0,DOLLY:1,PAN:2};
    var state=STATE.NONE,spherical=new THREE.Spherical(),sphericalDelta=new THREE.Spherical();
    var scale=1,panOffset=new THREE.Vector3(),rotateStart=new THREE.Vector2(),rotateEnd=new THREE.Vector2(),rotateDelta=new THREE.Vector2();
    var dollyStart=new THREE.Vector2(),dollyEnd=new THREE.Vector2(),dollyDelta=new THREE.Vector2();
    var panStart=new THREE.Vector2(),panEnd=new THREE.Vector2(),panDelta=new THREE.Vector2();
    function getZoomScale(){return Math.pow(0.95,scope.zoomSpeed);}
    function rotateLeft(a){sphericalDelta.theta-=a;}
    function rotateUp(a){sphericalDelta.phi-=a;}
    function dollyIn(s){scale/=s;}function dollyOut(s){scale*=s;}
    var panLeft=(function(){var v=new THREE.Vector3();return function(d,m){v.setFromMatrixColumn(m,0);v.multiplyScalar(-d);panOffset.add(v);}})();
    var panUp=(function(){var v=new THREE.Vector3();return function(d,m){v.setFromMatrixColumn(m,1);v.multiplyScalar(d);panOffset.add(v);}})();
    var pan=(function(){var offset=new THREE.Vector3();return function(dX,dY){var el=scope.domElement;if(camera.isPerspectiveCamera){var pos=camera.position;offset.copy(pos).sub(scope.target);var tD=offset.length();tD*=Math.tan(camera.fov/2*Math.PI/180);panLeft(2*dX*tD/el.clientHeight,camera.matrix);panUp(2*dY*tD/el.clientHeight,camera.matrix);}else{panLeft(dX*(camera.right-camera.left)/camera.zoom/el.clientWidth,camera.matrix);panUp(dY*(camera.top-camera.bottom)/camera.zoom/el.clientHeight,camera.matrix);}}})();
    this.update=(function(){var offset=new THREE.Vector3(),quat=new THREE.Quaternion().setFromUnitVectors(camera.up,new THREE.Vector3(0,1,0)),quatInv=quat.clone().invert(),lastPos=new THREE.Vector3(),lastQuat=new THREE.Quaternion();return function(){var pos=camera.position;offset.copy(pos).sub(scope.target);offset.applyQuaternion(quat);spherical.setFromVector3(offset);spherical.theta+=sphericalDelta.theta;spherical.phi+=sphericalDelta.phi;spherical.phi=Math.max(EPS,Math.min(Math.PI-EPS,spherical.phi));spherical.makeSafe();spherical.radius*=scale;spherical.radius=Math.max(scope.minDistance,Math.min(scope.maxDistance,spherical.radius));scope.target.add(panOffset);offset.setFromSpherical(spherical);offset.applyQuaternion(quatInv);camera.position.copy(scope.target).add(offset);camera.lookAt(scope.target);if(scope.enableDamping){sphericalDelta.theta*=(1-scope.dampingFactor);sphericalDelta.phi*=(1-scope.dampingFactor);panOffset.multiplyScalar(1-scope.dampingFactor);}else{sphericalDelta.set(0,0,0);panOffset.set(0,0,0);}scale=1;if(lastPos.distanceToSquared(camera.position)>EPS||8*(1-lastQuat.dot(camera.quaternion))>EPS){lastPos.copy(camera.position);lastQuat.copy(camera.quaternion);}return false;};})();
    this.dispose=function(){scope.domElement.removeEventListener('mousedown',onMouseDown);scope.domElement.removeEventListener('wheel',onWheel);scope.domElement.removeEventListener('touchstart',onTouchStart);scope.domElement.removeEventListener('touchend',onTouchEnd);scope.domElement.removeEventListener('touchmove',onTouchMove);document.removeEventListener('mousemove',onMouseMove);document.removeEventListener('mouseup',onMouseUp);};
    function onMouseDown(e){if(!scope.enabled)return;e.preventDefault();if(e.button===0){if(!scope.enableRotate)return;rotateStart.set(e.clientX,e.clientY);state=STATE.ROTATE;}else if(e.button===1){if(!scope.enableZoom)return;dollyStart.set(e.clientX,e.clientY);state=STATE.DOLLY;}else if(e.button===2){if(!scope.enablePan)return;panStart.set(e.clientX,e.clientY);state=STATE.PAN;}document.addEventListener('mousemove',onMouseMove,false);document.addEventListener('mouseup',onMouseUp,false);}
    function onMouseMove(e){if(!scope.enabled)return;e.preventDefault();if(state===STATE.ROTATE){rotateEnd.set(e.clientX,e.clientY);rotateDelta.subVectors(rotateEnd,rotateStart).multiplyScalar(scope.rotateSpeed);var el=scope.domElement;rotateLeft(2*Math.PI*rotateDelta.x/el.clientHeight);rotateUp(2*Math.PI*rotateDelta.y/el.clientHeight);rotateStart.copy(rotateEnd);}else if(state===STATE.DOLLY){dollyEnd.set(e.clientX,e.clientY);dollyDelta.subVectors(dollyEnd,dollyStart);if(dollyDelta.y>0)dollyIn(getZoomScale());else if(dollyDelta.y<0)dollyOut(getZoomScale());dollyStart.copy(dollyEnd);}else if(state===STATE.PAN){panEnd.set(e.clientX,e.clientY);panDelta.subVectors(panEnd,panStart).multiplyScalar(scope.panSpeed);pan(panDelta.x,panDelta.y);panStart.copy(panEnd);}scope.update();}
    function onMouseUp(){document.removeEventListener('mousemove',onMouseMove,false);document.removeEventListener('mouseup',onMouseUp,false);state=STATE.NONE;}
    function onWheel(e){if(!scope.enabled||!scope.enableZoom)return;e.preventDefault();e.deltaY<0?dollyOut(getZoomScale()):dollyIn(getZoomScale());scope.update();}
    var pointers=[],pointerPositions={};
    function onTouchStart(e){if(!scope.enabled)return;e.preventDefault();pointers=Array.from(e.touches);if(pointers.length===1){if(!scope.enableRotate)return;rotateStart.set(pointers[0].clientX,pointers[0].clientY);state=STATE.ROTATE;}else if(pointers.length===2){if(!scope.enableZoom)return;var dx=pointers[0].clientX-pointers[1].clientX,dy=pointers[0].clientY-pointers[1].clientY;dollyStart.set(0,Math.sqrt(dx*dx+dy*dy));state=STATE.DOLLY;}}
    function onTouchMove(e){if(!scope.enabled)return;e.preventDefault();pointers=Array.from(e.touches);if(state===STATE.ROTATE&&pointers.length===1){rotateEnd.set(pointers[0].clientX,pointers[0].clientY);rotateDelta.subVectors(rotateEnd,rotateStart).multiplyScalar(scope.rotateSpeed);var el=scope.domElement;rotateLeft(2*Math.PI*rotateDelta.x/el.clientHeight);rotateUp(2*Math.PI*rotateDelta.y/el.clientHeight);rotateStart.copy(rotateEnd);}else if(state===STATE.DOLLY&&pointers.length===2){var dx=pointers[0].clientX-pointers[1].clientX,dy=pointers[0].clientY-pointers[1].clientY;var dist=Math.sqrt(dx*dx+dy*dy);dollyEnd.set(0,dist);dollyDelta.set(0,Math.pow(dollyEnd.y/dollyStart.y,scope.zoomSpeed));dollyIn(dollyDelta.y);dollyStart.copy(dollyEnd);}scope.update();}
    function onTouchEnd(){state=STATE.NONE;}
    scope.domElement.addEventListener('mousedown',onMouseDown,false);scope.domElement.addEventListener('wheel',onWheel,{passive:false});scope.domElement.addEventListener('touchstart',onTouchStart,{passive:false});scope.domElement.addEventListener('touchend',onTouchEnd,false);scope.domElement.addEventListener('touchmove',onTouchMove,{passive:false});scope.domElement.addEventListener('contextmenu',function(e){e.preventDefault();},false);
    this.update();
  };

// ─────────────────────────────────────────────────────────────────────────────
//  GLOBAL STATE
// ─────────────────────────────────────────────────────────────────────────────
const API = 'http://localhost:5000/api';
let shareData  = null;   // full share doc from API
let projectData = null;  // the Project object
let currentMode = '2d';
let activeFloorIdx = 0;

// 2D state
let pan2D = { x: 0, y: 0 };
let zoom2DScale = 1;
let drag2D = false, drag2DStart = { x: 0, y: 0 }, drag2DPanStart = { x: 0, y: 0 };

// 3D state
let threeScene = null, threeRenderer = null, threeCamera = null, threeControls = null, threeAnimId = null;

// Walkthrough state
let walkPos = { x: 0, y: 1.65, z: 0 };
let walkYaw  = 0;
let walkPitch = 0;
let walkCamera = null, walkRenderer = null, walkScene = null, walkAnimId = null;
let walkKeys = {};
let walkDrag = false, walkDragStart = { x: 0, y: 0 };

// ─────────────────────────────────────────────────────────────────────────────
//  BOOTSTRAP
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  if (!token) { showError('No share token provided.'); return; }

  setLoader('Loading project…');

  // Determine auth header (try both client and architect tokens)
  const authToken = localStorage.getItem('client_token') || localStorage.getItem('token') || '';
  const headers = authToken ? { 'Authorization': 'Bearer ' + authToken } : {};

  try {
    const res  = await fetch(`${API}/shares/token/${token}`, { headers });
    const data = await res.json();
    if (!data.success) { showError(data.message || 'Could not load this project.'); return; }
    shareData   = data.data;
    projectData = shareData.project;
    if (!projectData) { showError('Project data is missing.'); return; }

    // Populate UI
    document.title = `${projectData.name} — SmartArch Viewer`;
    document.getElementById('topbarProject').textContent = projectData.name;
    const arch = shareData.sharedBy;
    if (arch) {
      const av = arch.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(arch.name)}&background=7c3aed&color=fff&bold=true&size=40`;
      document.getElementById('topbarArchAvatar').src = av;
      document.getElementById('topbarArchName').textContent = arch.name;
      document.getElementById('topbarArch').style.display = 'flex';
    }

    buildInfoPanel();
    hideLoader();
    draw2D();
  } catch(e) {
    showError('Failed to load project. Please check the link and try again.');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  INFO PANEL
// ─────────────────────────────────────────────────────────────────────────────
function buildInfoPanel() {
  const p    = projectData;
  const arch = shareData.sharedBy || {};
  const meta = p.metadata || {};

// ─────────────────────────────────────────────────────────────────────────────
//  2D FLOOR PLAN RENDERER
// ─────────────────────────────────────────────────────────────────────────────
const ROOM_COLORS = {entrance:'#a0c4ff',living:'#bde0fe',dining:'#ffd6a5',kitchen:'#fdffb6',bedroom:'#caffbf',bathroom:'#9bf6ff',hallway:'#e0e0e0',office:'#c3b1e1',garage:'#d4a373',staircase:'#bbb',other:'#c8d6e5'};

function draw2D() {
  const canvas = document.getElementById('viewCanvas');
  const wrap   = document.getElementById('canvasWrap');
  canvas.width  = wrap.clientWidth  || 800;
  canvas.height = wrap.clientHeight || 600;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const p       = projectData;
  const floor   = (p.floors||[])[activeFloorIdx];
  if (!floor) { ctx.fillStyle='#64748b';ctx.font='14px Inter';ctx.textAlign='center';ctx.fillText('No floor data',canvas.width/2,canvas.height/2); return; }
  const rooms   = floor.rooms || [];
  const W = p.totalWidth, D = p.totalDepth;

  // Auto-fit scale
  const PAD    = 48;
  const scaleX = (canvas.width  - PAD*2) / W;
  const scaleY = (canvas.height - PAD*2) / D;
  const baseScale = Math.min(scaleX, scaleY) * zoom2DScale;
  const offsetX   = (canvas.width  - W * baseScale) / 2 + pan2D.x;
  const offsetY   = (canvas.height - D * baseScale) / 2 + pan2D.y;

  const tX = x => offsetX + x * baseScale;
  const tY = y => offsetY + y * baseScale;
  const tW = w => w * baseScale;

  // Background
  ctx.fillStyle = '#0a1020';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(30,41,59,0.6)';
  ctx.lineWidth   = 0.5;
  for (let x = 0; x <= W; x += 2) { ctx.beginPath(); ctx.moveTo(tX(x), tY(0)); ctx.lineTo(tX(x), tY(D)); ctx.stroke(); }
  for (let y = 0; y <= D; y += 2) { ctx.beginPath(); ctx.moveTo(tX(0), tY(y)); ctx.lineTo(tX(W), tY(y)); ctx.stroke(); }

  // Building outline shadow
  ctx.shadowColor = 'rgba(0,212,200,0.12)';
  ctx.shadowBlur  = 16;
  ctx.fillStyle   = 'rgba(15,23,42,0.9)';
  ctx.fillRect(tX(0), tY(0), tW(W), tW(D));
  ctx.shadowBlur  = 0;

  // Rooms
  rooms.forEach(room => {
    const rx = tX(room.x), ry = tY(room.z||room.y||0);
    const rw = tW(room.width), rh = tW(room.depth||room.height||0);
    const color = ROOM_COLORS[room.type] || '#aaa';

    ctx.fillStyle = hexToRgba(color, 0.18);
    ctx.fillRect(rx, ry, rw, rh);
    ctx.strokeStyle = hexToRgba(color, 0.7);
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(rx, ry, rw, rh);

    // Label
    const fs = Math.max(8, Math.min(12, rw / 6));
    ctx.fillStyle   = color;
    ctx.font        = `600 ${fs}px Inter, sans-serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline= 'middle';
    const label = room.name || cap(room.type);
    if (rw > 30 && rh > 20) ctx.fillText(label, rx + rw/2, ry + rh/2);

    // Dimension labels
    if (rw > 50 && rh > 28 && room.width && (room.depth||room.height)) {
      const dimStr = `${room.width}×${room.depth||room.height}m`;
      ctx.font      = `400 ${Math.max(7,fs-2)}px Inter, sans-serif`;
      ctx.fillStyle = hexToRgba(color, 0.55);
      ctx.fillText(dimStr, rx + rw/2, ry + rh/2 + fs + 2);
    }

    // Doors
    (room.doors||[]).forEach(door => {
      drawDoor2D(ctx, room, door, tX, tY, tW, baseScale, color);
    });
    // Windows
    (room.windows||[]).forEach(win => {
      drawWindow2D(ctx, room, win, tX, tY, tW, baseScale);
    });
  });

  // Outer walls
  ctx.strokeStyle = '#00d4c8';
  ctx.lineWidth   = 2.5;
  ctx.strokeRect(tX(0), tY(0), tW(W), tW(D));

  // Compass rose
  drawCompass(ctx, canvas.width - 36, 36, 18);

  // Floor label
  ctx.fillStyle   = 'rgba(0,212,200,0.85)';
  ctx.font        = '700 11px Inter, sans-serif';
  ctx.textAlign   = 'left';
  ctx.textBaseline= 'top';
  ctx.fillText((floor.name || `Floor ${activeFloorIdx+1}`).toUpperCase(), tX(0) + 4, tY(0) + 4);

  // Scale bar
  drawScalebar(ctx, canvas, baseScale);
}

function drawDoor2D(ctx, room, door, tX, tY, tW, scale, color) {
  const dw  = tW(door.width || 0.9);
  const pos = door.pos ?? 0.5;
  const wall = door.wall;
  let x1,y1,x2,y2,arcX,arcY,startA,endA;
  const rx=tX(room.x),ry=tY(room.z||0),rw=tW(room.width),rh=tW(room.depth||room.height||0);

  ctx.strokeStyle = color;
  ctx.lineWidth   = 1.2;

  if (wall==='top')    { x1=rx+pos*rw-dw/2;y1=ry;x2=x1+dw;y2=ry;arcX=x1;arcY=ry;startA=0;endA=Math.PI/2; }
  else if(wall==='bottom'){x1=rx+pos*rw-dw/2;y1=ry+rh;x2=x1+dw;y2=ry+rh;arcX=x1;arcY=ry+rh;startA=-Math.PI/2;endA=0;}
  else if(wall==='left'){x1=rx;y1=ry+pos*rh-dw/2;x2=rx;y2=y1+dw;arcX=rx;arcY=y1;startA=0;endA=Math.PI/2;}
  else{x1=rx+rw;y1=ry+pos*rh-dw/2;x2=rx+rw;y2=y1+dw;arcX=rx+rw;arcY=y1;startA=Math.PI/2;endA=Math.PI;}
  if(x1===undefined)return;
  // Gap in wall
  ctx.clearRect(Math.min(x1,x2)-1,Math.min(y1,y2)-1,Math.abs(x2-x1)+2,Math.abs(y2-y1)+2);
  ctx.beginPath();ctx.arc(arcX,arcY,dw,startA,endA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.stroke();
}

function drawWindow2D(ctx, room, win, tX, tY, tW, scale) {
  const ww = tW(win.width || 1.0);
  const pos = win.pos ?? 0.5;
  const wall = win.wall;
  const rx=tX(room.x),ry=tY(room.z||0),rw=tW(room.width),rh=tW(room.depth||room.height||0);
  let x1,y1,x2,y2;
  if(wall==='top')    {x1=rx+pos*rw-ww/2;y1=ry-2;    x2=x1+ww;y2=ry+2;}
  else if(wall==='bottom'){x1=rx+pos*rw-ww/2;y1=ry+rh-2;x2=x1+ww;y2=ry+rh+2;}
  else if(wall==='left'){x1=rx-2;y1=ry+pos*rh-ww/2;x2=rx+2;y2=y1+ww;}
  else {x1=rx+rw-2;y1=ry+pos*rh-ww/2;x2=rx+rw+2;y2=y1+ww;}
  if(x1===undefined)return;
  ctx.fillStyle='rgba(136,238,255,0.55)';
  ctx.fillRect(x1,y1,x2-x1,y2-y1);
  ctx.strokeStyle='rgba(136,238,255,0.9)';
  ctx.lineWidth=1;
  ctx.strokeRect(x1,y1,x2-x1,y2-y1);
}

function drawCompass(ctx, cx, cy, r) {
  ctx.save();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='rgba(15,23,42,0.7)';ctx.fill();
  ctx.strokeStyle='rgba(0,212,200,0.4)';ctx.lineWidth=1;ctx.stroke();
  const dirs = [['N',0],['E',90],['S',180],['W',270]];
  dirs.forEach(([d,a]) => {
    const rad = (a-90)*Math.PI/180;
    const x = cx + Math.cos(rad)*(r-4);
    const y = cy + Math.sin(rad)*(r-4);
    ctx.fillStyle = d==='N' ? '#00d4c8' : '#475569';
    ctx.font = `700 ${d==='N'?9:7}px Inter,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d, x, y);
  });
  ctx.restore();
}

function drawScalebar(ctx, canvas, scale) {
  const x = 16, y = canvas.height - 20;
  const barM = 5; const barPx = barM * scale;
  ctx.fillStyle='rgba(15,23,42,0.7)';ctx.fillRect(x-4,y-10,barPx+8,16);
  ctx.strokeStyle='#00d4c8';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+barPx,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-4);ctx.lineTo(x,y+4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+barPx,y-4);ctx.lineTo(x+barPx,y+4);ctx.stroke();
  ctx.fillStyle='#94a3b8';ctx.font='700 9px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(`${barM}m`, x+barPx/2, y+3);
}

function zoom2D(factor) { zoom2DScale = Math.max(0.3, Math.min(6, zoom2DScale * factor)); draw2D(); }
function reset2D()      { zoom2DScale = 1; pan2D = {x:0,y:0}; draw2D(); }

// 2D pan via mouse
(function() {
  const canvas = document.getElementById('viewCanvas');
  canvas.addEventListener('mousedown', e => { drag2D=true; drag2DStart={x:e.clientX,y:e.clientY}; drag2DPanStart={...pan2D}; canvas.style.cursor='grabbing'; });
  document.addEventListener('mouseup',  () => { drag2D=false; document.getElementById('viewCanvas').style.cursor='grab'; });
  document.addEventListener('mousemove',e => {
    if(!drag2D) return;
    pan2D.x = drag2DPanStart.x + (e.clientX - drag2DStart.x);
    pan2D.y = drag2DPanStart.y + (e.clientY - drag2DStart.y);
    draw2D();
  });
  canvas.addEventListener('wheel', e => { e.preventDefault(); zoom2D(e.deltaY < 0 ? 1.1 : 0.91); }, {passive:false});
  canvas.style.cursor = 'grab';
})();

//  3D / WIREFRAME / DOLLHOUSE  (Three.js)

function stdMat(color, roughness=0.7, metalness=0) {
  return new THREE.MeshStandardMaterial({color, roughness, metalness});
}

const STYLE_DEFS = {
  modern:      {skyColor:0x0d1117,groundColor:0x1a2030,wallColor:0x3a4a6b,wallR:0.75,wallM:0.05,ambientInt:0.6,roofColor:0x1a2040},
  minimalist:  {skyColor:0x0a0f1a,groundColor:0xd8dce6,wallColor:0xfafafa,wallR:0.85,wallM:0,   ambientInt:0.7,roofColor:0xe8e8e8},
  traditional: {skyColor:0x0d1117,groundColor:0x3d2b1f,wallColor:0xc8997a,wallR:0.9, wallM:0,   ambientInt:0.5,roofColor:0x8b4513},
  luxury:      {skyColor:0x050508,groundColor:0x1a1a1a,wallColor:0x222222,wallR:0.4, wallM:0.1, ambientInt:0.4,roofColor:0x1a1a1a},
};

function buildThree(wireframe, dollhouse) {
  cleanupThree();
  const container = document.getElementById('threeContainer');
  container.innerHTML = '';
  const W3 = container.clientWidth  || 800;
  const H3 = container.clientHeight || 600;
  const p  = projectData;
  const style = p.style || 'modern';
  const S = STYLE_DEFS[style] || STYLE_DEFS.modern;
  const {totalWidth:W, totalDepth:D, floors=[]} = p;
  const numFloors = floors.length;
  const floorH = floors[0]?.height || 2.7;
  const roofType = p.specifications?.roofType || 'pitched';
  let totalH = 0; floors.forEach(f => totalH += f.height || floorH);

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(S.skyColor);
  if(!wireframe) scene.fog = new THREE.FogExp2(S.skyColor, 0.006);
  threeScene = scene;

  // Camera
  const aspect = W3/H3;
  const camera = new THREE.PerspectiveCamera(dollhouse ? 40 : 50, aspect, 0.1, 800);
  threeCamera = camera;
  const dist = Math.max(W, D) * 1.4 + numFloors * floorH;
  if (dollhouse) {
    camera.position.set(0, dist * 1.6, dist * 0.4);
    camera.lookAt(0, totalH * 0.3, 0);
  } else {
    camera.position.set(dist*0.7, dist*0.65, dist*0.7);
    camera.lookAt(0, totalH/2, 0);
  }

  // Renderer
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(W3, H3);
  renderer.shadowMap.enabled = !wireframe;
  renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
  renderer.toneMapping       = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.domElement.style.cssText = 'display:block;width:100%;height:100%;position:absolute;top:0;left:0;';
  container.appendChild(renderer.domElement);
  threeRenderer = renderer;

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping  = true;
  controls.dampingFactor  = 0.06;
  controls.target.set(0, totalH / 2, 0);
  controls.minDistance    = 3;
  controls.maxDistance    = 300;
  if (dollhouse) { controls.maxPolarAngle = Math.PI * 0.45; }
  controls.update();
  threeControls = controls;

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, wireframe ? 1.0 : S.ambientInt));
  if (!wireframe) {
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(W*1.5, totalH*3+20, D*1.5);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    const sc = Math.max(W, D) + 15;
    sun.shadow.camera.left=-sc;sun.shadow.camera.right=sc;sun.shadow.camera.top=sc;sun.shadow.camera.bottom=-sc;
    sun.shadow.camera.near=0.5;sun.shadow.camera.far=400;
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xaaccff, 0.3);
    fill.position.set(-W, 10, -D);
    scene.add(fill);
  }

  // Materials
  const matOpts = wireframe
    ? { color:0x00d4c8, wireframe:true }
    : null;

  function mat(color, r=0.7, m=0) {
    if (wireframe) return new THREE.MeshStandardMaterial({color:0x00d4c8,wireframe:true});
    return new THREE.MeshStandardMaterial({color,roughness:r,metalness:m});
  }

  const wallMat  = mat(S.wallColor,  S.wallR, S.wallM);
  const iWallMat = mat(0xd0d8e8, 0.8, 0);
  const slabMat  = mat(0x888888, 0.7, 0);
  const roofMat  = mat(S.roofColor, 0.7, 0);

  // Ground
  if (!wireframe) {
    const gs = Math.max(W,D)*4;
    const gm = new THREE.Mesh(new THREE.PlaneGeometry(gs,gs), mat(S.groundColor, 0.95, 0));
    gm.rotation.x = -Math.PI/2; gm.receiveShadow = true; scene.add(gm);
    const grid = new THREE.GridHelper(gs, Math.floor(gs/2), 0x334466, 0x222f44);
    grid.material.opacity=0.2; grid.material.transparent=true; scene.add(grid);
  }

  // Foundation slab
  const slab = new THREE.Mesh(new THREE.BoxGeometry(W+0.6, 0.2, D+0.6), slabMat);
  slab.position.set(0, -0.1, 0); slab.receiveShadow = true; scene.add(slab);

  let baseY = 0;
  floors.forEach((floor, fi) => {
    const fh = floor.height || floorH;
    const ox = -W/2, oz = -D/2;
    if (fi > 0) {
      const sf = new THREE.Mesh(new THREE.BoxGeometry(W+0.1, 0.25, D+0.1), slabMat);
      sf.position.set(0, baseY-0.125, 0); sf.receiveShadow=true; scene.add(sf);
    }

    // Dollhouse: skip ceiling on top floor so you can look in
    if (!dollhouse || fi < floors.length-1) {
      const ceil = new THREE.Mesh(new THREE.BoxGeometry(W, 0.12, D), mat(0xdddddd, 0.9, 0));
      ceil.position.set(0, baseY+fh-0.06, 0); scene.add(ceil);
    }

    // Outer walls
    const wt = 0.22;
    [{w:W,d:wt,x:0,z:-D/2+wt/2},{w:W,d:wt,x:0,z:D/2-wt/2},{w:wt,d:D,x:-W/2+wt/2,z:0},{w:wt,d:D,x:W/2-wt/2,z:0}]
      .forEach(({w,d,x,z}) => {
        const wall = new THREE.Mesh(new THREE.BoxGeometry(w,fh,d), wallMat);
        wall.position.set(x, baseY+fh/2, z); wall.castShadow=true; wall.receiveShadow=true; scene.add(wall);
      });

    // Windows (auto)
    if (!wireframe) addAutoWindows(scene, W, D, baseY, fh, floor, style);

    // Rooms
    floor.rooms.forEach(room => {
      const cx = ox + room.x + room.width/2;
      const cz = oz + (room.z||room.y||0) + (room.depth||room.height||0)/2;
      const rh = room.height || fh;

      // Floor tile
      const roomFloorColor = ({bedroom:0x8fbc8f,bathroom:0x87ceeb,kitchen:0xf5deb3,living:0x9eb8d4,dining:0xd4a762,hallway:0xb0b0b0})[room.type] || 0x556070;
      const rf = new THREE.Mesh(new THREE.BoxGeometry(room.width-0.02, 0.08, (room.depth||room.height||0)-0.02), mat(roomFloorColor, 0.6, 0));
      rf.position.set(cx, baseY+0.04, cz); rf.receiveShadow=true; scene.add(rf);

      // Interior walls
      [{w:room.width,d:0.1,x:cx,z:oz+(room.z||0),isEdge:(room.z||0)<=0.01},
       {w:room.width,d:0.1,x:cx,z:oz+(room.z||0)+(room.depth||0),isEdge:(room.z||0)+(room.depth||0)>=D-0.01},
       {w:0.1,d:(room.depth||0),x:ox+room.x,z:cz,isEdge:room.x<=0.01},
       {w:0.1,d:(room.depth||0),x:ox+room.x+room.width,z:cz,isEdge:room.x+room.width>=W-0.01}
      ].forEach(({w,d,x,z,isEdge}) => {
        if (!isEdge) {
          const iw = new THREE.Mesh(new THREE.BoxGeometry(w,rh,d), iWallMat);
          iw.position.set(x, baseY+rh/2, z); iw.castShadow=true; iw.receiveShadow=true; scene.add(iw);
        }
      });

      // Room light (not wireframe)
      if (!wireframe) {
        const rl = new THREE.PointLight(0xfff5e0, 0.3, Math.max(room.width,(room.depth||3))*1.8);
        rl.position.set(cx, baseY+rh-0.4, cz); scene.add(rl);
      }
    });

    // Multi-floor label
    if (floors.length > 1) addFloorLabel3D(scene, floor, fi, baseY, W, D, fh, wireframe);
    if (floors.length > 1 && fi < floors.length-1) addStair3D(scene, W, D, baseY, fh, wireframe);

    baseY += fh;
  });

  // Roof
  buildRoof3D(scene, roofType, W, D, totalH, roofMat, wireframe);

  // Entry door frame
  addDoorFrame3D(scene, W, D, 0, floors[0]?.height||floorH, wallMat, wireframe);

  // Animate
  function animate() {
    threeAnimId = requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // Resize
  const onR = () => {
    const nw=container.clientWidth||800, nh=container.clientHeight||600;
    camera.aspect=nw/nh; camera.updateProjectionMatrix();
    renderer.setSize(nw, nh);
  };
  window.addEventListener('resize', onR);
  renderer._resizeListener = onR;
}

function addAutoWindows(scene, W, D, baseY, fh, floor, style) {
  const userWins = (floor?.rooms||[]).reduce((s,r)=>s+(r.windows||[]).length,0);
  if (userWins>0) return;
  const frameMat = stdMat(0x222244,0.5,0.2);
  const glassMat = new THREE.MeshStandardMaterial({color:0x88ccff,roughness:0.05,metalness:0.1,transparent:true,opacity:0.35});
  const winW=1.2, winH=1.1, frameT=0.12, winY=baseY+fh*0.55;
  for(let xi=-W/2+2.5;xi<W/2-1.5;xi+=3.5){
    [-D/2+0.12,D/2-0.12].forEach(wz=>{
      const f=new THREE.Mesh(new THREE.BoxGeometry(winW+0.1,winH+0.1,frameT),frameMat);f.position.set(xi,winY,wz);scene.add(f);
      const g=new THREE.Mesh(new THREE.BoxGeometry(winW,winH,frameT*0.3),glassMat);g.position.set(xi,winY,wz);scene.add(g);
    });
  }
  for(let zi=-D/2+2.5;zi<D/2-1.5;zi+=3.5){
    [-W/2+0.12,W/2-0.12].forEach(wx=>{
      const f=new THREE.Mesh(new THREE.BoxGeometry(frameT,winH+0.1,winW+0.1),frameMat);f.position.set(wx,winY,zi);scene.add(f);
      const g=new THREE.Mesh(new THREE.BoxGeometry(frameT*0.3,winH,winW),glassMat);g.position.set(wx,winY,zi);scene.add(g);
    });
  }
}

function addFloorLabel3D(scene, floor, fi, baseY, W, D, fh, wireframe) {
  if (wireframe) return;
  // Simple marker plane
  const mat = new THREE.MeshBasicMaterial({color:0x00d4c8,transparent:true,opacity:0.7});
  const bar = new THREE.Mesh(new THREE.BoxGeometry(W*0.3, 0.05, 0.05), mat);
  bar.position.set(0, baseY+fh*0.98, -D/2+0.2); scene.add(bar);
}

function addStair3D(scene, W, D, baseY, fh, wireframe) {
  const mat = wireframe
    ? new THREE.MeshStandardMaterial({color:0x00d4c8,wireframe:true})
    : stdMat(0x888888, 0.7);
  for (let i=0; i<8; i++) {
    const step = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.18, 0.28), mat);
    step.position.set(W/2-1.5, baseY+i*0.35, -D/2+0.5+i*0.28);
    step.castShadow=true; scene.add(step);
  }
}

function addDoorFrame3D(scene, W, D, baseY, fh, wallMat, wireframe) {
  const mat = wireframe ? new THREE.MeshStandardMaterial({color:0x00d4c8,wireframe:true}) : wallMat;
  const dH=2.2, dW=1.0, dZ=-D/2+0.1;
  const frame = new THREE.Mesh(new THREE.BoxGeometry(dW+0.2,dH+0.15,0.15), mat);
  frame.position.set(0, baseY+dH/2, dZ); scene.add(frame);
}

function buildRoof3D(scene, roofType, W, D, topY, roofMat, wireframe) {
  const mat = wireframe ? new THREE.MeshStandardMaterial({color:0x00d4c8,wireframe:true}) : roofMat;
  const overhang = 0.5;
  if (roofType === 'flat') {
    const r = new THREE.Mesh(new THREE.BoxGeometry(W+overhang*2, 0.3, D+overhang*2), mat);
    r.position.set(0, topY+0.15, 0); r.castShadow=true; scene.add(r);
  } else if (roofType === 'hip') {
    const g = new THREE.ConeGeometry(Math.max(W,D)*0.72, 3, 4);
    const r = new THREE.Mesh(g, mat);
    r.position.set(0, topY+1.5, 0); r.rotation.y=Math.PI/4; r.castShadow=true; scene.add(r);
  } else {
    const rh = Math.min(W,D)*0.35, pitch=Math.sqrt(Math.pow(W/2+overhang,2)+Math.pow(rh,2)), angle=Math.atan2(rh,W/2+overhang);
    [-1,1].forEach(side => {
      const rp = new THREE.Mesh(new THREE.BoxGeometry(pitch,0.2,D+overhang*2), mat);
      rp.position.set(side*(W/4), topY+rh/2, 0); rp.rotation.z=side*-angle; rp.castShadow=true; scene.add(rp);
    });
    const triShape = new THREE.Shape();
    triShape.moveTo(-W/2-overhang,0); triShape.lineTo(W/2+overhang,0); triShape.lineTo(0,rh); triShape.closePath();
    const triGeo = new THREE.ShapeGeometry(triShape);
    [-D/2-overhang,D/2+overhang].forEach(z => {
      const t = new THREE.Mesh(triGeo, mat);
      t.position.set(0, topY, z); scene.add(t);
    });
  }
}

function cleanupThree() {
  if (threeAnimId) cancelAnimationFrame(threeAnimId);
  if (threeRenderer) {
    if (threeRenderer._resizeListener) window.removeEventListener('resize', threeRenderer._resizeListener);
    if (threeControls && threeControls.dispose) threeControls.dispose();
    threeRenderer.dispose();
    const container = document.getElementById('threeContainer');
    container.innerHTML = '';
  }
  threeScene=null; threeRenderer=null; threeCamera=null; threeControls=null; threeAnimId=null;
}

// ─────────────────────────────────────────────────────────────────────────────
//  WALKTHROUGH MODE
// ─────────────────────────────────────────────────────────────────────────────
function buildWalkthrough() {
  cleanupWalk();
  const container = document.getElementById('threeContainer');
  container.innerHTML = '';
  const W3=container.clientWidth||800, H3=container.clientHeight||600;
  const p=projectData;
  const {totalWidth:W,totalDepth:D,floors=[]}=p;
  const fh=floors[0]?.height||2.7;
  let totalH=0; floors.forEach(f=>totalH+=f.height||fh);
  const style=p.style||'modern';
  const S=STYLE_DEFS[style]||STYLE_DEFS.modern;

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(S.skyColor);
  scene.fog=new THREE.FogExp2(S.skyColor,0.04);
  walkScene=scene;

  // Start inside building
  walkPos={x:0,y:1.65,z:0};walkYaw=0;walkPitch=0;

  const camera=new THREE.PerspectiveCamera(75,W3/H3,0.05,200);
  camera.position.set(0,1.65,0);
  walkCamera=camera;

  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(W3,H3);
  renderer.shadowMap.enabled=true;
  renderer.domElement.style.cssText='display:block;width:100%;height:100%;position:absolute;top:0;left:0;cursor:none;';
  container.appendChild(renderer.domElement);
  walkRenderer=renderer;

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  floors.forEach((floor,fi)=>{
    let by=0; for(let i=0;i<fi;i++) by+=floors[i].height||fh;
    floor.rooms.forEach(room=>{
      const ox=-W/2,oz=-D/2;
      const cx=ox+room.x+room.width/2, cz=oz+(room.z||0)+(room.depth||3)/2;
      const rl=new THREE.PointLight(0xfff5e0,0.7,Math.max(room.width,(room.depth||3))*1.5);
      rl.position.set(cx,by+(room.height||fh)-0.5,cz);
      rl.castShadow=true; scene.add(rl);
    });
  });

  // Build geometry (solid walls + floor + ceiling per room)
  const wallMat=stdMat(S.wallColor,S.wallR,S.wallM);
  const iWallMat=stdMat(0xd0d8e8,0.8,0);
  const floorMat=stdMat(S.groundColor,0.7,0);
  const ceilMat=stdMat(0xdddddd,0.9,0);

  let baseY=0;
  floors.forEach((floor,fi)=>{
    const thisFH=floor.height||fh, ox=-W/2, oz=-D/2;

    // Floor slab
    const fs=new THREE.Mesh(new THREE.BoxGeometry(W,0.1,D),floorMat);
    fs.position.set(0,baseY-0.05,0); fs.receiveShadow=true; scene.add(fs);
    // Ceiling
    const cs=new THREE.Mesh(new THREE.BoxGeometry(W,0.1,D),ceilMat);
    cs.position.set(0,baseY+thisFH+0.05,0); scene.add(cs);

    // Outer walls (solid thick)
    const wt=0.3;
    [{w:W,d:wt,x:0,z:-D/2-wt/2},{w:W,d:wt,x:0,z:D/2+wt/2},{w:wt,d:D+wt*2,x:-W/2-wt/2,z:0},{w:wt,d:D+wt*2,x:W/2+wt/2,z:0}].forEach(({w,d,x,z})=>{
      const wall=new THREE.Mesh(new THREE.BoxGeometry(w,thisFH,d),wallMat);
      wall.position.set(x,baseY+thisFH/2,z); wall.castShadow=true; wall.receiveShadow=true; scene.add(wall);
    });

    // Interior walls
    floor.rooms.forEach(room=>{
      const iwt=0.12;
      const rmx=ox+room.x, rmz=oz+(room.z||0), rmw=room.width, rmd=room.depth||3, rmh=room.height||thisFH;
      [[rmx+rmw/2,  rmz-iwt/2, rmw,iwt],[rmx+rmw/2, rmz+rmd+iwt/2,rmw,iwt],[rmx-iwt/2,rmz+rmd/2,iwt,rmd],[rmx+rmw+iwt/2,rmz+rmd/2,iwt,rmd]].forEach(([x,z,w,d])=>{
        // Only draw if not near outer wall
        if(Math.abs(x)>W/2-0.3||Math.abs(z)>D/2-0.3)return;
        const iw=new THREE.Mesh(new THREE.BoxGeometry(w,rmh,d),iWallMat);
        iw.position.set(x,baseY+rmh/2,z); iw.receiveShadow=true; scene.add(iw);
      });
      // Room floor texture variation
      const rfColor=({bathroom:0x87ceeb,kitchen:0xf5deb3,bedroom:0x8fbc8f,living:0x9eb8d4})[room.type]||0x556070;
      const rfm=new THREE.Mesh(new THREE.BoxGeometry(rmw-0.1,0.05,rmd-0.1),stdMat(rfColor,0.6,0));
      rfm.position.set(ox+room.x+rmw/2,baseY+0.02,oz+(room.z||0)+rmd/2); rfm.receiveShadow=true; scene.add(rfm);
    });

    baseY+=thisFH;
  });

  // Mouse look
  container.addEventListener('click',()=>{ if(document.pointerLockElement!==container) container.requestPointerLock(); });
  document.addEventListener('pointerlockchange',()=>{});
  document.addEventListener('mousemove', onWalkMouseMove);

  // Keyboard
  document.addEventListener('keydown',onWalkKeyDown);
  document.addEventListener('keyup',  onWalkKeyUp);

  // Animate
  let last=0;
  function animate(ts){
    walkAnimId=requestAnimationFrame(animate);
    const dt=Math.min((ts-last)/1000,0.05); last=ts;
    updateWalkMovement(dt,W,D,fh);
    renderer.render(scene,camera);
  }
  requestAnimationFrame(ts=>{last=ts;animate(ts);});

  const onR=()=>{ const nw=container.clientWidth||800,nh=container.clientHeight||600; camera.aspect=nw/nh; camera.updateProjectionMatrix(); renderer.setSize(nw,nh); };
  window.addEventListener('resize',onR);
  renderer._resizeListener=onR;
}

function onWalkMouseMove(e) {
  if (document.pointerLockElement) {
    walkYaw   -= e.movementX * 0.002;
    walkPitch  = Math.max(-1.2, Math.min(1.2, walkPitch - e.movementY * 0.002));
    applyWalkCamera();
  }
}
function onWalkKeyDown(e){ walkKeys[e.key.toLowerCase()]=true; }
function onWalkKeyUp(e)  { walkKeys[e.key.toLowerCase()]=false; }

const _walkMoving = {};
function wMove(dir, active) { _walkMoving[dir] = active; }

function updateWalkMovement(dt, W, D, fh) {
  const speed=4;
  let mx=0, mz=0;
  if(walkKeys['w']||walkKeys['arrowup']||_walkMoving['fwd'])  mz=-1;
  if(walkKeys['s']||walkKeys['arrowdown']||_walkMoving['back']) mz=1;
  if(walkKeys['a']||walkKeys['arrowleft']||_walkMoving['left']) mx=-1;
  if(walkKeys['d']||walkKeys['arrowright']||_walkMoving['right'])mx=1;

  const cos=Math.cos(walkYaw), sin=Math.sin(walkYaw);
  walkPos.x += (mx*cos - mz*sin) * speed * dt;
  walkPos.z += (mx*sin + mz*cos) * speed * dt;
  // Clamp inside building
  walkPos.x = Math.max(-W/2+0.4, Math.min(W/2-0.4, walkPos.x));
  walkPos.z = Math.max(-D/2+0.4, Math.min(D/2-0.4, walkPos.z));
  applyWalkCamera();
}

function applyWalkCamera() {
  if (!walkCamera) return;
  walkCamera.position.set(walkPos.x, walkPos.y, walkPos.z);
  walkCamera.rotation.order='YXZ';
  walkCamera.rotation.y=walkYaw;
  walkCamera.rotation.x=walkPitch;
}

function cleanupWalk() {
  if(walkAnimId) cancelAnimationFrame(walkAnimId);
  document.removeEventListener('mousemove', onWalkMouseMove);
  document.removeEventListener('keydown', onWalkKeyDown);
  document.removeEventListener('keyup',   onWalkKeyUp);
  if(walkRenderer){
    if(walkRenderer._resizeListener) window.removeEventListener('resize',walkRenderer._resizeListener);
    walkRenderer.dispose();
    const c=document.getElementById('threeContainer');
    if(c) c.innerHTML='';
  }
  walkScene=null; walkRenderer=null; walkCamera=null; walkAnimId=null;
  walkKeys={}; Object.keys(_walkMoving).forEach(k=>delete _walkMoving[k]);
}

// ─────────────────────────────────────────────────────────────────────────────
//  PANEL TOGGLE
// ─────────────────────────────────────────────────────────────────────────────
let panelOpen = true;
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('infoPanel').classList.toggle('collapsed', !panelOpen);
  document.getElementById('panelToggleIcon').className = panelOpen ? 'fas fa-chevron-left' : 'fas fa-chevron-right';
  // Redraw 2D after panel resize
  if (currentMode==='2d') setTimeout(draw2D, 250);
}

// ─────────────────────────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function setLoader(msg) {
  document.getElementById('loaderText').textContent = msg||'Loading…';
  document.getElementById('loader').style.display='flex';
}
function hideLoader() {
  document.getElementById('loader').style.display='none';
}
function showError(msg) {
  document.getElementById('loader').innerHTML =
    `<div class="error-box"><i class="fas fa-exclamation-circle"></i><div style="font-size:1rem;font-weight:600;margin-bottom:0.5rem;">Could Not Load Project</div><div style="font-size:0.85rem;color:#94a3b8;">${esc(msg)}</div><button onclick="history.back()" style="margin-top:1.25rem;background:linear-gradient(135deg,#00d4c8,#7c3aed);color:#fff;border:none;border-radius:8px;padding:0.5rem 1.25rem;cursor:pointer;font-size:0.85rem;font-weight:600;">Go Back</button></div>`;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }
function hexToRgba(hex, alpha) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Window resize — redraw 2D
window.addEventListener('resize', () => { if(currentMode==='2d') draw2D(); });

// ─────────────────────────────────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────────────────────────────────
init();
</script>
